<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SHINTAKU WORK ユーザー登録</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=Noto+Sans+JP:wght@500;700;800;900&display=swap" rel="stylesheet">

<style>
@page {
  size: A4;
  margin: 0;
}

* {
  box-sizing: border-box;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

body {
  margin: 0;
  background: #eef3f7;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
  color: #172033;
  font-family: "Inter","Noto Sans JP",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.sheet {
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
  width: 210mm;
  min-height: 297mm;
  margin: 0 auto;
  padding: 8mm 10mm;
  position: relative;
  background:
    radial-gradient(circle at 14% 8%, rgba(120,120,120,.08), transparent 24%),
    radial-gradient(circle at 88% 14%, rgba(50,112,255,.08), transparent 25%),
    linear-gradient(145deg,#ffffff 0%,#f1f5f9 54%,#eef2f7 100%);
}

.sheet::before {
  content: "";
  position: absolute;
  inset: 7mm;
  border: .4mm solid rgba(23,32,51,.06);
  border-radius: 10mm;
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 1;
  min-height: 275mm;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.eyebrow {
  margin-top: 2mm;
  display: inline-flex;
  padding: 1.8mm 8mm;
  border-radius: 999px;
  background: #172033;
  color: #fff;
  font-size: 12pt;
  font-weight: 900;
  letter-spacing: .08em;
}

h1 {
  margin: 5mm 0 2mm;
  font-size: 28pt;
  line-height: 1.05;
  letter-spacing: -.05em;
  font-weight: 900;
  text-align: center;
}

h1 span {
  color: #172033;
}

.register-card {
  width: 148mm;
  margin-top: 10mm;
  padding: 5mm;
  border-radius: 11mm;
  background: rgba(255,255,255,.95);
  border: .7mm solid rgba(6,199,85,.25);
  box-shadow:
    0 18px 42px rgba(23,32,51,.09),
    inset 0 1px 0 rgba(255,255,255,.95);
}

.card-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.scanner {
  width: 78mm;
  height: 78mm;
  display: grid;
  place-items: center;
  position: relative;
}

.scanner::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 8mm;
  background:
    linear-gradient(#06c755,#06c755) top left / 20mm 1.1mm no-repeat,
    linear-gradient(#06c755,#06c755) top left / 1.1mm 20mm no-repeat,
    linear-gradient(#06c755,#06c755) top right / 20mm 1.1mm no-repeat,
    linear-gradient(#06c755,#06c755) top right / 1.1mm 20mm no-repeat,
    linear-gradient(#06c755,#06c755) bottom left / 20mm 1.1mm no-repeat,
    linear-gradient(#06c755,#06c755) bottom left / 1.1mm 20mm no-repeat,
    linear-gradient(#06c755,#06c755) bottom right / 20mm 1.1mm no-repeat,
    linear-gradient(#06c755,#06c755) bottom right / 1.1mm 20mm no-repeat;
  pointer-events: none;
}

.qr-box {
  width: 66mm;
  height: 66mm;
  background: #fff;
  border-radius: 5mm;
  display: grid;
  place-items: center;
  border: .45mm solid rgba(6,199,85,.20);
  box-shadow:
    0 12px 26px rgba(23,32,51,.08),
    inset 0 0 0 2mm #fff;
  padding: 5mm;
}

.qr-img {
  width: 78%;
  height: 78%;
  display: block;
  object-fit: contain;
  image-rendering: pixelated;
}

.pill {
  margin-top: 3mm;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 58mm;
  padding: 2.2mm 8mm;
  border-radius: 999px;
  background: rgba(6,199,85,.12);
  border: .45mm solid rgba(6,199,85,.28);
  color: #058c3d;
  font-size: 10pt;
  font-weight: 900;
  letter-spacing: .18em;
  text-decoration: none;
}

.message {
  margin-top: 8mm;
  text-align: center;
}

.message h2 {
  margin: 0;
  font-size: 15pt;
  line-height: 1.35;
  font-weight: 900;
}

.message p {
  margin: 2mm 0 0;
  color: #536176;
  font-size: 8.8pt;
  line-height: 1.5;
  font-weight: 700;
}

.howto {
  width: 100%;
  margin-top: 8mm;
  border-radius: 7mm;
  padding: 4mm;
  background: rgba(255,255,255,.86);
  border: .45mm solid rgba(23,32,51,.08);
}

.howto-title {
  text-align: center;
  margin-bottom: 2.5mm;
  font-size: 14pt;
  font-weight: 900;
}

.steps {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 3.5mm;
}

.step {
  min-height: 23mm;
  padding: 2.5mm;
  border-radius: 5mm;
  background: #f7f9fb;
  text-align: center;
}

.num {
  width: 7mm;
  height: 7mm;
  margin: 0 auto 1mm;
  border-radius: 50%;
  background: #172033;
  color: #fff;
  display: grid;
  place-items: center;
  font-weight: 900;
  font-size: 10pt;
}

.step h3 {
  margin: 0 0 .8mm;
  font-size: 9.2pt;
  font-weight: 900;
}

.step p {
  margin: 0;
  color: #536176;
  font-size: 7.4pt;
  line-height: 1.35;
  font-weight: 700;
}

footer {
  margin-top: 4mm;
  text-align: center;
  font-size: 7.5pt;
  color: #7a8798;
  font-weight: 800;
  letter-spacing: .12em;
}

@media print {
  body {
    background: #eef3f7;
  }

  .sheet {
    margin: 0;
  }
}
</style>
</head>
