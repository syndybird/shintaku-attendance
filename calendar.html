<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHINTAKU WORKS シフトカレンダー</title>
  <script src="config.js"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:      #f4f6f2;
      --card:    #ffffff;
      --brand:   #2d4a2d;
      --text:    #1a2a1a;
      --sub:     #6b7f6b;
      --divider: #e0e8e0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ===== ローディング ===== */
    #loading-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 100;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--divider);
      border-top-color: #5a9e5a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen p { font-size: 13px; color: var(--sub); }

    /* ===== アクセス拒否 ===== */
    #gate-screen {
      display: none; position: fixed; inset: 0; background: var(--bg);
      justify-content: center; align-items: center; padding: 24px; z-index: 90;
    }
    .gate-card {
      background: var(--card); border-radius: 20px; padding: 40px 28px;
      text-align: center; max-width: 340px; width: 100%;
      border: 1px solid var(--divider); box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    }
    .gate-card h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
    .gate-card p  { font-size: 13px; color: var(--sub); line-height: 1.8; }

    /* ===== メイン ===== */
    #main-content { display: none; }

    /* ===== ヘッダー ===== */
    header {
      background: var(--brand); padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 12px rgba(45,74,45,0.3);
    }
    .brand-small { font-size: 10px; letter-spacing: 0.2em; color: rgba(255,255,255,0.45); text-transform: uppercase; }
    .brand-main  { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: #fff; margin-top: 2px; }

    .print-btn {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
      color: white; padding: 7px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    /* ===== 月ナビ ===== */
    .month-nav {
      max-width: 600px; margin: 14px auto 0; padding: 0 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .month-title { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
    .nav-btn {
      background: var(--card); border: 1px solid var(--divider);
      border-radius: 10px; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; color: var(--text);
    }

    /* ===== 凡例 ===== */
    .legend {
      max-width: 600px; margin: 10px auto 0; padding: 0 12px;
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--sub); }

    /* ===== カレンダー ===== */
    .cal-wrap { max-width: 600px; margin: 10px auto 16px; padding: 0 12px; }

    .cal-card {
      background: var(--card); border-radius: 16px;
      border: 1px solid var(--divider);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    .cal-header {
      display: grid; grid-template-columns: repeat(7, 1fr);
      background: var(--brand);
    }

    .cal-header-cell {
      text-align: center; padding: 10px 0;
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.7); letter-spacing: 0.05em;
    }

    .cal-header-cell:first-child { color: rgba(255,100,100,0.9); }
    .cal-header-cell:last-child  { color: rgba(100,150,255,0.9); }

    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
    }

    .cal-cell {
      border-right: 1px solid var(--divider);
      border-bottom: 1px solid var(--divider);
      padding: 4px;
      min-height: 80px;
    }

    .cal-cell:nth-child(7n) { border-right: none; }

    .cal-cell.other-month { background: #fafafa; }
    .cal-cell.today { background: #f0fff0; }

    .day-num {
      font-size: 11px; font-weight: 700;
      color: var(--sub); margin-bottom: 3px;
      text-align: right; padding-right: 2px;
    }

    .cal-cell.sunday  .day-num { color: #dc2626; }
    .cal-cell.saturday .day-num { color: #2563eb; }
    .cal-cell.other-month .day-num { color: #ccc; }

    .slot-row {
      display: flex; align-items: center; gap: 2px;
      margin-bottom: 2px;
    }

    .slot-label {
      font-size: 8px; font-weight: 700; color: var(--sub);
      width: 14px; flex-shrink: 0; letter-spacing: 0;
    }

    .icons-row { display: flex; gap: 2px; flex-wrap: wrap; }

    /* ===== 印刷スタイル ===== */
    @media print {
      header .print-btn { display: none; }
      .month-nav .nav-btn { display: none; }
      body { background: white; }
      .cal-card { box-shadow: none; border: 1px solid #ccc; }
      .cal-cell { min-height: 70px; }
      @page { margin: 10mm; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #main-content.visible { animation: fadeUp 0.4s ease both; }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p>認証中...</p>
  </div>

  <div id="gate-screen">
    <div class="gate-card">
      <div style="font-size:40px;margin-bottom:16px;">🔒</div>
      <h2>アクセス権限がありません</h2>
      <p>このシステムは登録スタッフ専用です。<br>管理者に連絡してください。</p>
    </div>
  </div>

  <div id="main-content">
    <header>
      <div>
        <div class="brand-small">Shintaku Works</div>
        <div class="brand-main">シフトカレンダー</div>
      </div>
      <button class="print-btn" onclick="window.print()">🖨️ 印刷</button>
    </header>

    <div class="month-nav">
      <button class="nav-btn" id="prev-month">&#8249;</button>
      <div class="month-title" id="month-title"></div>
      <button class="nav-btn" id="next-month">&#8250;</button>
    </div>

    <div class="legend" id="legend"></div>

    <div class="cal-wrap">
      <div class="cal-card">
        <div class="cal-header">
          <div class="cal-header-cell">日</div>
          <div class="cal-header-cell">月</div>
          <div class="cal-header-cell">火</div>
          <div class="cal-header-cell">水</div>
          <div class="cal-header-cell">木</div>
          <div class="cal-header-cell">金</div>
          <div class="cal-header-cell">土</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = CONFIG.GAS_URL;
    const LIFF_ID = CONFIG.LIFF_ID_SHIFT;

    // ===== スタッフ設定（config.jsに後で移動）=====
    const STAFF = {
      "Ua54d4388a1b51fe819f406fd9caa4348": { name: "やましん", color: "#2d7d2d", gender: "male" },
      "TEST_USER_ID": { name: "テスト", color: "#2563eb", gender: "male" },
    };

    let currentYear, currentMonth;
    let shiftData = [];

    const today = new Date();
    currentYear  = today.getFullYear();
    currentMonth = today.getMonth();

    // ===== SVGアイコン生成 =====
    function getSVG(userId, size = 20) {
      const staff = STAFF[userId] || { color: "#aaa", gender: "male" };
      const c = staff.color;
      if (staff.gender === "female") {
        return `<svg width="${size}" height="${size}" viewBox="0 0 56 56" fill="none">
          <circle cx="28" cy="28" r="28" fill="${c}"/>
          <circle cx="28" cy="21" r="9" fill="white" opacity="0.95"/>
          <ellipse cx="28" cy="42" rx="14" ry="10" fill="white" opacity="0.95"/>
          <ellipse cx="19" cy="22" rx="3.5" ry="7" fill="${c}" opacity="0.5"/>
          <ellipse cx="37" cy="22" rx="3.5" ry="7" fill="${c}" opacity="0.5"/>
          <ellipse cx="28" cy="14" rx="9" ry="4" fill="${c}" opacity="0.5"/>
        </svg>`;
      } else {
        return `<svg width="${size}" height="${size}" viewBox="0 0 56 56" fill="none">
          <circle cx="28" cy="28" r="28" fill="${c}"/>
          <circle cx="28" cy="21" r="9" fill="white" opacity="0.95"/>
          <ellipse cx="28" cy="42" rx="14" ry="10" fill="white" opacity="0.95"/>
          <rect x="19" y="15" width="18" height="5" rx="2.5" fill="${c}" opacity="0.5"/>
        </svg>`;
      }
    }

    // ===== 凡例描画 =====
    function renderLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = Object.entries(STAFF).map(([id, s]) => `
        <div class="legend-item">
          ${getSVG(id, 20)}
          <span>${s.name}</span>
        </div>
      `).join('');
    }

    // ===== 月タイトル =====
    function updateMonthTitle() {
      const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      document.getElementById('month-title').innerText = `${currentYear}年 ${months[currentMonth]}`;
    }

    // ===== カレンダー描画 =====
    function renderCalendar() {
      updateMonthTitle();
      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const prevDays = new Date(currentYear, currentMonth, 0).getDate();

      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

      let cells = [];

      // 前月の空白
      for (let i = firstDay - 1; i >= 0; i--) {
        cells.push({ day: prevDays - i, thisMonth: false });
      }
      // 当月
      for (let d = 1; d <= daysInMonth; d++) {
        cells.push({ day: d, thisMonth: true });
      }
      // 次月の空白
      while (cells.length % 7 !== 0) {
        cells.push({ day: cells.length - firstDay - daysInMonth + 1, thisMonth: false });
      }

      cells.forEach((cell, idx) => {
        const div = document.createElement('div');
        div.className = 'cal-cell';

        if (!cell.thisMonth) {
          div.classList.add('other-month');
          div.innerHTML = `<div class="day-num">${cell.day}</div>`;
          grid.appendChild(div);
          return;
        }

        const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}`;
        const dayOfWeek = new Date(currentYear, currentMonth, cell.day).getDay();

        if (dayOfWeek === 0) div.classList.add('sunday');
        if (dayOfWeek === 6) div.classList.add('saturday');
        if (dateStr === todayStr) div.classList.add('today');

        // その日の確定データを取得
        const dayData = shiftData.filter(d => d.date === dateStr && (d.status === '確定' || d.status === '休み確定'));

        // AM出勤者（休み確定でない人）
        const amWorkers = Object.keys(STAFF).filter(uid => {
          const off = dayData.find(d => d.userId === uid && d.slot === 'ALL' && d.status === '休み確定');
          return !off;
        });

        const pmWorkers = Object.keys(STAFF).filter(uid => {
          const off = dayData.find(d => d.userId === uid && d.slot === 'ALL' && d.status === '休み確定');
          return !off;
        });

        div.innerHTML = `
          <div class="day-num">${cell.day}</div>
          <div class="slot-row">
            <span class="slot-label">AM</span>
            <div class="icons-row">
              ${amWorkers.map(uid => getSVG(uid, 18)).join('')}
            </div>
          </div>
          <div class="slot-row">
            <span class="slot-label">PM</span>
            <div class="icons-row">
              ${pmWorkers.map(uid => getSVG(uid, 18)).join('')}
            </div>
          </div>
        `;

        grid.appendChild(div);
      });
    }

    // ===== LIFF初期化 =====
    document.addEventListener("DOMContentLoaded", function() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) { liff.login(); return; }
          liff.getProfile().then(profile => {
            checkAccess(profile.userId);
          });
        })
        .catch(() => showError("LIFF初期化に失敗しました"));
    });

    function checkAccess(userId) {
      fetch(`${GAS_URL}?action=checkUser&userId=${encodeURIComponent(userId)}`)
        .then(r => r.json())
        .then(result => {
          document.getElementById("loading-screen").style.display = "none";
          if (result.access === "granted") {
            const mc = document.getElementById("main-content");
            mc.style.display = "block";
            mc.classList.add("visible");
            loadAndRender();
          } else {
            document.getElementById("gate-screen").style.display = "flex";
          }
        });
    }

    function loadAndRender() {
      fetch(`${GAS_URL}?action=getShift`)
        .then(r => r.json())
        .then(data => {
          shiftData = data;
          renderLegend();
          renderCalendar();
        });
    }

    document.getElementById('prev-month').addEventListener('click', () => {
      if (currentMonth === 0) { currentMonth = 11; currentYear--; }
      else { currentMonth--; }
      renderCalendar();
    });

    document.getElementById('next-month').addEventListener('click', () => {
      if (currentMonth === 11) { currentMonth = 0; currentYear++; }
      else { currentMonth++; }
      renderCalendar();
    });

    function showError(msg) {
      document.getElementById("loading-screen").innerHTML =
        `<div style="font-size:32px;margin-bottom:12px;">⚠️</div><p style="color:#ef4444;font-weight:700;">${msg}</p>`;
    }
  </script>
</body>
</html>
