<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHINTAKU WORKS 管理者画面</title>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <style>
    /* CSS変数はconfig.jsから自動適用されます */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: var(--font-body), -apple-system, sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle at 20% 20%, rgba(0,0,0,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none; z-index: 0;
    }

    header {
      background: var(--brand);
      color: #fff;
      padding: 16px 20px;
      position: sticky; top: 0; z-index: 50;
      display: flex; justify-content: space-between; align-items: center;
    }

    .header-left .brand-name {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .header-left .brand-sub {
      font-size: 10px; letter-spacing: 0.15em;
      color: rgba(255,255,255,0.5); text-transform: uppercase; margin-top: 1px;
    }

    .admin-badge {
      font-size: 11px; font-weight: 700;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 5px 12px; border-radius: 20px;
      letter-spacing: 0.05em;
    }

    .main { max-width: 680px; margin: 0 auto; padding: 16px 12px; position: relative; z-index: 1; }

    /* 凡例 */
    .legend {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--divider);
      padding: 12px 16px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 500; color: var(--text-main);
    }

    .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* カレンダーカード */
    .cal-card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--divider);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      padding: 12px 8px 16px;
      overflow: hidden;
    }

    /* FullCalendar */
    .fc .fc-toolbar-title {
      font-family: var(--font-display) !important;
      font-size: 16px !important; font-weight: 800;
      color: var(--text-main);
    }

    .fc .fc-button {
      background: var(--brand) !important;
      border-color: var(--brand) !important;
      border-radius: 8px !important;
      font-size: 12px !important;
      padding: 4px 10px !important;
    }

    .fc .fc-col-header-cell-cushion {
      font-size: 11px; font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .fc-day-sat .fc-col-header-cell-cushion,
    .fc-day-sat .fc-daygrid-day-number { color: #2563eb !important; font-weight: 700; }
    .fc-day-sun .fc-col-header-cell-cushion,
    .fc-day-sun .fc-daygrid-day-number { color: #dc2626 !important; font-weight: 700; }

    .fc .fc-daygrid-day-number {
      font-size: 11px; font-weight: 600;
      color: var(--text-sub); padding: 2px 4px;
    }

    .fc .fc-daygrid-day-events {
      display: flex; flex-direction: column;
      gap: 3px; padding: 2px 2px 4px !important;
    }

    /* スロットボタン */
    .slot-btn {
      width: 100%;
      text-align: center;
      padding: 3px 2px;
      font-size: 9px; font-weight: 700;
      border-radius: 5px;
      cursor: pointer; user-select: none;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .slot-btn:active { transform: scale(0.95); }

    .slot-empty   { background: #f1f5f9; color: #94a3b8; cursor: default; }
    .slot-booked  { background: #fee2e2; color: #b91c1c; }
    .slot-conflict{ background: #f3e8ff; color: #6b21a8; }
    .slot-fixed   { background: var(--slot-fixed); color: var(--slot-fixed-txt); }

    /* モーダル */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      justify-content: center; align-items: center;
      z-index: 100; padding: 24px;
    }

    .modal-overlay.open { display: flex; }

    .modal-card {
      background: var(--card);
      border-radius: 20px;
      max-width: 340px; width: 100%;
      padding: 32px 24px;
      border: 1px solid var(--divider);
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      text-align: center;
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
      color: var(--text-main); margin-bottom: 6px;
    }

    .modal-user {
      font-size: 13px; color: var(--text-sub); margin-bottom: 24px;
    }

    .modal-btns { display: flex; flex-direction: column; gap: 10px; }

    .btn {
      width: 100%; padding: 14px;
      font-family: var(--font-body), sans-serif;
      font-size: 14px; font-weight: 700;
      border: none; border-radius: 12px;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
      display: flex; justify-content: center; align-items: center; gap: 8px;
    }

    .btn:active { transform: scale(0.98); }
    .btn-confirm { background: var(--slot-fixed); color: var(--slot-fixed-txt); }
    .btn-delete  { background: #ef4444; color: #fff; }
    .btn-cancel  { background: var(--bg); color: var(--text-sub); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .main { animation: fadeUp 0.4s ease both; }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <div class="brand-name">Shintaku Works</div>
      <div class="brand-sub">Admin Panel</div>
    </div>
    <div class="admin-badge"><i class="fa-solid fa-lock-open" style="margin-right:5px;"></i>管理者専用</div>
  </header>

  <div class="main">

    <!-- 凡例 -->
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#f1f5f9;border:1px solid #cbd5e1;"></div>空き</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fee2e2;"></div>予約あり</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f3e8ff;"></div>競合あり</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--slot-fixed);"></div>確定済み</div>
    </div>

    <!-- カレンダー -->
    <div class="cal-card">
      <div id="calendar"></div>
    </div>

  </div>

  <!-- モーダル -->
  <div class="modal-overlay" id="admin-modal">
    <div class="modal-card">
      <div class="modal-title" id="modal-title">日時</div>
      <div class="modal-user" id="modal-user">申請者: なし</div>
      <div class="modal-btns">
        <button class="btn btn-confirm" id="btn-confirm-act">
          <i class="fa-solid fa-check"></i> 確定にする
        </button>
        <button class="btn btn-delete" id="btn-delete-act">
          <i class="fa-solid fa-trash"></i> 削除して空きに戻す
        </button>
        <button class="btn btn-cancel" id="btn-close-act">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = CONFIG.GAS_URL;
    let currentSheetData = [];
    let activeTarget = null;

    document.addEventListener("DOMContentLoaded", initAdminSystem);

    function initAdminSystem() {
      fetch(`${GAS_URL}?action=getShift`)
        .then(res => res.json())
        .then(data => {
          currentSheetData = data;
          renderAdminCalendar();
        });
    }

    function renderAdminCalendar() {
      const calEl = document.getElementById('calendar');
      calEl.innerHTML = '';

      const calendar = new FullCalendar.Calendar(calEl, {
        initialView: 'dayGridMonth',
        locale: 'ja',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        height: 'auto',
        dayCellContent: e => e.dayNumberText.replace('日', ''),

        dayCellDidMount: function(info) {
          const d = info.date;
          const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

          const container = info.el.querySelector('.fc-daygrid-day-events');
          if (!container) return;
          container.innerHTML = '';

          ['AM', 'PM'].forEach(slot => {
            const btn = document.createElement('div');
            btn.className = 'slot-btn';

            const match = currentSheetData.find(x => x.date === dateStr && x.slot === slot);

            if (match) {
              if (match.status === '確定') {
                btn.classList.add('slot-fixed');
                btn.innerText = `✓ ${match.name || match.user || ''}`;
              } else if (match.status === '競合') {
                btn.classList.add('slot-conflict');
                btn.innerText = `! ${slot}`;
              } else {
                btn.classList.add('slot-booked');
                btn.innerText = match.name || match.user || slot;
              }
              btn.addEventListener('click', e => {
                e.stopPropagation();
                openModal(dateStr, slot, match.name || match.user || '');
              });
            } else {
              btn.classList.add('slot-empty');
              btn.innerText = '空き';
            }

            container.appendChild(btn);
          });
        }
      });
      calendar.render();
    }

    function openModal(date, slot, user) {
      activeTarget = { date, slot };
      document.getElementById("modal-title").innerText = `${date}【${slot}】`;
      document.getElementById("modal-user").innerText = `申請者: ${user}`;
      document.getElementById("admin-modal").classList.add("open");
    }

    document.getElementById("btn-close-act").addEventListener("click", () => {
      document.getElementById("admin-modal").classList.remove("open");
    });

    document.getElementById("admin-modal").addEventListener("click", e => {
      if (e.target === document.getElementById("admin-modal")) {
        document.getElementById("admin-modal").classList.remove("open");
      }
    });

    document.getElementById("btn-confirm-act").addEventListener("click", () => executeAction("確定"));
    document.getElementById("btn-delete-act").addEventListener("click",  () => executeAction("削除"));

    function executeAction(status) {
      if (!activeTarget) return;
      const payload = { date: activeTarget.date, slot: activeTarget.slot, status };
      const finalUrl = `${GAS_URL}?action=adminConfirm&data=${encodeURIComponent(JSON.stringify(payload))}`;
      document.getElementById("admin-modal").classList.remove("open");

      fetch(finalUrl, { method: "GET" })
        .then(res => res.json())
        .then(result => {
          if (result.result === "success") {
            initAdminSystem();
          } else {
            alert("エラー: " + result.message);
          }
        });
    }
  </script>
</body>
</html>
