<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHINTAKU WORKS 管理者画面</title>
  <script src="config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #f4f6f2;
      --card:    #ffffff;
      --brand:   #2d4a2d;
      --accent:  #5a9e5a;
      --accent-lt: #e8f5e8;
      --accent-bd: #b8ddb8;
      --text:    #1a2a1a;
      --sub:     #6b7f6b;
      --divider: #e0e8e0;
      --off:     #ef4444;
      --off-lt:  #fff1f1;
      --pending: #f59e0b;
      --pending-lt: #fffbeb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 40px; }

    header {
      background: var(--brand); color: #fff;
      padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 12px rgba(45,74,45,0.3);
    }
    .brand-small { font-size: 10px; letter-spacing: 0.2em; color: rgba(255,255,255,0.45); text-transform: uppercase; }
    .brand-main  { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: #fff; margin-top: 2px; }
    .admin-badge { font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; }

    .main { max-width: 680px; margin: 0 auto; padding: 16px 12px; }

    /* 月ナビ */
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .month-title { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
    .nav-btn {
      background: var(--card); border: 1px solid var(--divider);
      border-radius: 10px; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; color: var(--text);
    }

    /* サマリー */
    .summary { display: flex; gap: 8px; margin-bottom: 14px; }
    .summary-chip {
      flex: 1; padding: 10px 12px; background: var(--card);
      border: 1px solid var(--divider); border-radius: 12px; text-align: center;
    }
    .summary-chip .num { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--text); }
    .summary-chip .lbl { font-size: 10px; color: var(--sub); margin-top: 2px; }
    .summary-chip.alert .num { color: var(--off); }
    .summary-chip.ok .num { color: var(--accent); }

    /* カード一覧 */
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      color: var(--sub); text-transform: uppercase; margin-bottom: 8px;
    }

    .request-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

    .request-card {
      background: var(--card); border-radius: 14px;
      border: 1px solid var(--divider);
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }

    .request-card .user-icon {
      width: 36px; height: 36px; flex-shrink: 0;
    }

    .request-card .info { flex: 1; }
    .request-card .info .name { font-size: 13px; font-weight: 700; color: var(--text); }
    .request-card .info .date { font-size: 12px; color: var(--sub); margin-top: 2px; }

    .request-card .actions { display: flex; gap: 6px; }

    .btn-approve {
      background: var(--accent); color: white;
      border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: opacity 0.15s;
    }
    .btn-approve:hover { opacity: 0.85; }

    .btn-reject {
      background: var(--off-lt); color: var(--off);
      border: 1px solid #fca5a5; border-radius: 8px;
      padding: 7px 14px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }

    .btn-bulk {
      width: 100%; padding: 14px;
      background: var(--brand); color: white;
      border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; margin-bottom: 8px;
      box-shadow: 0 4px 16px rgba(45,74,45,0.3);
    }

    .empty-state {
      background: var(--card); border-radius: 14px;
      border: 1px solid var(--divider);
      padding: 32px; text-align: center;
      color: var(--sub); font-size: 13px;
    }

    /* ユーザーアイコン */
    .user-svg { width: 36px; height: 36px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .main { animation: fadeUp 0.4s ease both; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="brand-small">Shintaku Works</div>
    <div class="brand-main">管理者パネル</div>
  </div>
  <div class="admin-badge">🔓 管理者専用</div>
</header>

<div class="main">

  <div class="month-nav">
    <button class="nav-btn" id="prev-month">&#8249;</button>
    <div class="month-title" id="month-title"></div>
    <button class="nav-btn" id="next-month">&#8250;</button>
  </div>

  <div class="summary">
    <div class="summary-chip alert">
      <div class="num" id="count-pending">0</div>
      <div class="lbl">未確定の希望</div>
    </div>
    <div class="summary-chip ok">
      <div class="num" id="count-confirmed">0</div>
      <div class="lbl">確定済み</div>
    </div>
    <div class="summary-chip">
      <div class="num" id="count-days">0</div>
      <div class="lbl">対象日数</div>
    </div>
  </div>

  <button class="btn-bulk" id="btn-bulk-approve">✅ 未確定の希望をすべて承認する</button>

  <div class="section-title">休み希望一覧</div>
  <div class="request-list" id="request-list">
    <div class="empty-state">読み込み中...</div>
  </div>

</div>

<script>
  const GAS_URL = CONFIG.GAS_URL;
  let allData = [];
  let currentYear, currentMonth;

  const today = new Date();
  currentYear  = today.getMonth() === 11 ? today.getFullYear() + 1 : today.getFullYear();
  currentMonth = today.getMonth() === 11 ? 0 : today.getMonth() + 1;

  // ユーザー設定（config.jsに後で移動予定）
  const STAFF = {
    "Ua54d4388a1b51fe819f406fd9caa4348": { name: "やましん", color: "#2d7d2d", gender: "male" },
    "TEST_USER_ID": { name: "テスト", color: "#2563eb", gender: "male" },
  };

  function getSVG(userId, size = 36) {
    const staff = STAFF[userId] || { color: "#aaa", gender: "male" };
    const c = staff.color;
    const dark = c;
    if (staff.gender === "female") {
      return `<svg width="${size}" height="${size}" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="28" cy="28" r="28" fill="${c}"/>
        <circle cx="28" cy="21" r="9" fill="white" opacity="0.95"/>
        <ellipse cx="28" cy="42" rx="14" ry="10" fill="white" opacity="0.95"/>
        <ellipse cx="19" cy="22" rx="3.5" ry="7" fill="${dark}" opacity="0.4"/>
        <ellipse cx="37" cy="22" rx="3.5" ry="7" fill="${dark}" opacity="0.4"/>
        <ellipse cx="28" cy="14" rx="9" ry="4" fill="${dark}" opacity="0.4"/>
      </svg>`;
    } else {
      return `<svg width="${size}" height="${size}" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="28" cy="28" r="28" fill="${c}"/>
        <circle cx="28" cy="21" r="9" fill="white" opacity="0.95"/>
        <ellipse cx="28" cy="42" rx="14" ry="10" fill="white" opacity="0.95"/>
        <rect x="19" y="15" width="18" height="5" rx="2.5" fill="${dark}" opacity="0.4"/>
      </svg>`;
    }
  }

  function updateMonthTitle() {
    const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    document.getElementById('month-title').innerText = `${currentYear}年 ${months[currentMonth]}`;
  }

  function loadData() {
    fetch(`${GAS_URL}?action=getShift`)
      .then(r => r.json())
      .then(data => {
        allData = data;
        renderList();
      })
      .catch(() => {
        document.getElementById('request-list').innerHTML = '<div class="empty-state">データ取得に失敗しました</div>';
      });
  }

  function renderList() {
    const monthStr = `${currentYear}-${String(currentMonth + 1).padStart(2,'0')}`;
    const filtered = allData.filter(d => d.date && d.date.startsWith(monthStr));

    const pending   = filtered.filter(d => d.status === '休み希望');
    const confirmed = filtered.filter(d => d.status === '休み確定' || d.status === '確定');
    const days      = [...new Set(filtered.map(d => d.date))].length;

    document.getElementById('count-pending').innerText   = pending.length;
    document.getElementById('count-confirmed').innerText = confirmed.length;
    document.getElementById('count-days').innerText      = days;

    const list = document.getElementById('request-list');

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">この月の希望はまだありません</div>';
      return;
    }

    // 日付順にソート
    const sorted = [...filtered].sort((a, b) => a.date.localeCompare(b.date));

    list.innerHTML = sorted.map(d => {
      const staff = STAFF[d.userId] || { name: d.name || '不明', color: '#aaa' };
      const isPending = d.status === '休み希望';
      const isConfirmed = d.status === '休み確定' || d.status === '確定';
      const dateObj = new Date(d.date);
      const dayNames = ['日','月','火','水','木','金','土'];
      const dayLabel = `${d.date}（${dayNames[dateObj.getDay()]}）`;

      return `
        <div class="request-card" id="card-${d.date}-${d.slot}">
          <div class="user-icon">${getSVG(d.userId, 36)}</div>
          <div class="info">
            <div class="name">${staff.name}</div>
            <div class="date">${dayLabel}
              <span style="margin-left:6px; font-size:10px; padding:2px 7px; border-radius:10px; font-weight:700;
                background:${isPending ? 'var(--pending-lt)' : 'var(--accent-lt)'};
                color:${isPending ? 'var(--pending)' : 'var(--accent)'};">
                ${isPending ? '未確定' : '確定済み'}
              </span>
            </div>
          </div>
          ${isPending ? `
          <div class="actions">
            <button class="btn-approve" onclick="approveOne('${d.date}', '${d.slot}')">承認</button>
            <button class="btn-reject"  onclick="rejectOne('${d.date}', '${d.slot}')">却下</button>
          </div>` : ''}
        </div>
      `;
    }).join('');
  }

  function approveOne(date, slot) {
    const payload = { date, slot, status: '休み確定' };
    const url = `${GAS_URL}?action=adminConfirm&data=${encodeURIComponent(JSON.stringify(payload))}`;
    fetch(url).then(r => r.json()).then(() => loadData());
  }

  function rejectOne(date, slot) {
    if (!confirm(`${date} の休み希望を却下しますか？`)) return;
    const payload = { date, slot, status: '削除' };
    const url = `${GAS_URL}?action=adminConfirm&data=${encodeURIComponent(JSON.stringify(payload))}`;
    fetch(url).then(r => r.json()).then(() => loadData());
  }

  document.getElementById('btn-bulk-approve').addEventListener('click', () => {
    const monthStr = `${currentYear}-${String(currentMonth + 1).padStart(2,'0')}`;
    const pending = allData.filter(d => d.date.startsWith(monthStr) && d.status === '休み希望');
    if (pending.length === 0) { alert('未確定の希望はありません'); return; }
    if (!confirm(`${pending.length}件の希望をすべて承認しますか？`)) return;

    Promise.all(pending.map(d => {
      const payload = { date: d.date, slot: d.slot, status: '休み確定' };
      const url = `${GAS_URL}?action=adminConfirm&data=${encodeURIComponent(JSON.stringify(payload))}`;
      return fetch(url).then(r => r.json());
    })).then(() => loadData());
  });

  document.getElementById('prev-month').addEventListener('click', () => {
    if (currentMonth === 0) { currentMonth = 11; currentYear--; }
    else { currentMonth--; }
    updateMonthTitle(); renderList();
  });

  document.getElementById('next-month').addEventListener('click', () => {
    if (currentMonth === 11) { currentMonth = 0; currentYear++; }
    else { currentMonth++; }
    updateMonthTitle(); renderList();
  });

  updateMonthTitle();
  loadData();
</script>
</body>
</html>
