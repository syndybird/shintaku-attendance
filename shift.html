<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHINTAKU WORKS シフト予約</title>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    /* AM/PM 2分割のためのカスタムスタイル */
    .fc-daygrid-day-events { display: flex; flex-direction: column; gap: 4px; padding: 4px !important; }
    .slot-btn { text-align: center; padding: 6px 4px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; user-select: none; transition: all 0.2s; }
    
    /* カラーロジックと白文字・黒字の調整 */
    .bg-green-slot { background-color: #22c55e; color: #ffffff; }  /* 空き（緑枠・白文字） */
    .bg-red-slot { background-color: #ef4444; color: #ffffff; }    /* 予約済（赤枠・白文字） */
    .bg-blue-slot { background-color: #3b82f6; color: #ffffff; border: 2px solid #1d4ed8; }   /* 選択中（青枠・白文字） */
    .bg-purple-slot { background-color: #a855f7; color: #ffffff; border: 2px solid #6b21a8; } /* 競合（紫枠・白文字） */
    .bg-sky-slot { background-color: #38bdf8; color: #ffffff; cursor: not-allowed; } /* 【新規】確定済（水色枠・白文字・クリック不可） */
    
    /* AM/PMの文字自体を強調するためのスタイル */
    .slot-text-main { color: #000000; font-weight: 800; margin-right: 4px; } /* 黒字のAM/PM */
    .slot-symbol { font-weight: 900; } /* 白文字の◯や✕ */

    /* 土日の曜日カラー変更 */
    .fc-day-sat .fc-col-header-cell-cushion,
    .fc-day-sat .fc-daygrid-day-number { color: #2563eb !important; font-weight: bold; } /* 土曜日は青 */
    .fc-day-sun .fc-col-header-cell-cushion,
    .fc-day-sun .fc-daygrid-day-number { color: #dc2626 !important; font-weight: bold; } /* 日曜日は赤 */
  </style>
</head>
<body class="bg-slate-100 font-sans min-height-screen pb-24">

  <header class="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
    <h1 class="text-xl font-bold"><i class="fa-solid fa-calendar-days mr-2"></i>シフト希望提出</h1>
    <div id="user-info" class="text-sm bg-blue-800 px-3 py-1 rounded">読み込み中...</div>
  </header>

  <div class="max-w-md mx-auto m-3 p-3 bg-white rounded-lg shadow-sm grid grid-cols-5 gap-1 text-center text-xs font-bold">
    <div class="p-1 bg-green-500 text-white rounded">緑:◯ 可</div>
    <div class="p-1 bg-red-500 text-white rounded">赤:✕ 既約</div>
    <div class="p-1 bg-sky-400 text-white rounded">水色:確定</div>
    <div class="p-1 bg-blue-500 text-white rounded">青:選択中</div>
    <div class="p-1 bg-purple-500 text-white rounded">紫:競合</div>
  </div>

  <div class="max-w-md mx-auto p-2 bg-white rounded-lg shadow-md m-3">
    <div id="calendar"></div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 p-4 bg-white shadow-lg border-t border-slate-200 flex justify-center z-50">
    <button id="submit-btn" class="w-full max-w-md bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md flex justify-center items-center gap-2 transition disabled:bg-slate-400" disabled>
      <i class="fa-solid fa-paper-plane"></i> シフトを提出する (<span id="select-count">0</span>)
    </button>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxm7UaGS-K8ifm6zbqja199RqTt2GzIlRoMzGHjYjGW3TU_SlrtoJaz5vAw4GmQi0Wi/exec";
    
    let userName = "テストユーザー"; 
    let currentSheetData = []; 
    let selectedSlots = {};   

    // LIFF初期化
    document.addEventListener("DOMContentLoaded", function() {
      liff.init({ liffId: "2010136950-uGfcZEcw" })
        .then(() => {
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            liff.getProfile().then(profile => {
              userName = profile.displayName;
              document.getElementById("user-info").innerText = "👤 " + userName;
              initSystem();
            });
          }
        }).catch(err => {
          console.log("LIFF初期化失敗、テストモードで起動");
          document.getElementById("user-info").innerText = "⚠️ テストモード";
          initSystem();
        });
    });

    function initSystem() {
      fetch(`${GAS_URL}?action=getShift`)
        .then(res => res.json())
        .then(data => {
          currentSheetData = data;
          renderCalendar();
        }).catch(err => {
          alert("データ通信に失敗しました。電波の良い場所で再開してください。");
          renderCalendar();
        });
    }

    function renderCalendar() {
      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'ja',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        height: 'auto',
        dayCellContent: function(e) { return e.dayNumberText.replace('日', ''); },
        
        dayCellDidMount: function(info) {
          const y = info.date.getFullYear();
          const m = String(info.date.getMonth() + 1).padStart(2, '0');
          const d = String(info.date.getDate()).padStart(2, '0');
          const dateStr = `${y}-${m}-${d}`;

          const eventsContainer = info.el.querySelector('.fc-daygrid-day-events');
          if (!eventsContainer) return;
          eventsContainer.innerHTML = ''; 

          ['AM', 'PM'].forEach(slot => {
            const btn = document.createElement('div');
            btn.className = 'slot-btn';
            
            const match = currentSheetData.find(d => d.date === dateStr && d.slot === slot);
            
            if (match) {
              if (match.status === '確定') {
                // 【新規】確定済みの場合は水色にして、クリックイベントを設定しない（ロック）
                btn.classList.add('bg-sky-slot');
                btn.innerHTML = `<span class="slot-text-main">${slot}</span><span class="slot-symbol">確定</span>`;
                btn.dataset.status = 'confirmed';
              } else if (match.status === '予約済み') {
                btn.classList.add('bg-red-slot');
                btn.innerHTML = `<span class="slot-text-main">${slot}</span><span class="slot-symbol">✕</span>`;
                btn.dataset.status = 'reserved';
              } else if (match.status === '競合') {
                btn.classList.add('bg-purple-slot');
                btn.innerHTML = `<span class="slot-text-main">${slot}</span><span class="slot-symbol">競合中</span>`;
                btn.dataset.status = 'conflict';
              }
            } else {
              btn.classList.add('bg-green-slot');
              btn.innerHTML = `<span class="slot-text-main">${slot}</span><span class="slot-symbol">◯</span>`;
              btn.dataset.status = 'available';
            }

            // 確定済みのスロットでなければクリックイベントを登録
            if (btn.dataset.status !== 'confirmed') {
              btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const key = `${dateStr}_${slot}`;

                if (btn.dataset.status === 'available') {
                  if (selectedSlots[key]) {
                    delete selectedSlots[key];
                    btn.className = 'slot-btn bg-green-slot';
                    btn.innerHTML = `<span class="slot-text-main">${slot}</span><span class="slot-symbol">◯</span>`;
                  } else {
                    selectedSlots[key] = { date: dateStr, slot: slot, mode: 'normal' };
                    btn.className = 'slot-btn bg-blue-slot';
                    btn.innerHTML = `<span class="slot-text-main">${slot}</span><span class="slot-symbol">選択中</span>`;
                  }
                } else if (btn.dataset.status === 'reserved' || btn.dataset.status === 'conflict') {
                  if (selectedSlots[key]) {
                    delete selectedSlots[key];
                    btn.className = `slot-btn ${match.status === '予約済み' ? 'bg-red-slot' : 'bg-purple-slot'}`;
                    btn.innerHTML = match.status === '予約済み' ? 
                      `<span class="slot-text-main">${slot}</span><span class="slot-symbol">✕</span>` : 
                      `<span class="slot-text-main">${slot}</span><span class="slot-symbol">競合中</span>`;
                  } else {
                    selectedSlots[key] = { date: dateStr, slot: slot, mode: 'force' };
                    btn.className = 'slot-btn bg-purple-slot';
                    btn.innerHTML = `<span class="slot-text-main">${slot}</span><span class="slot-symbol">競合申請</span>`;
                  }
                }
                updateSubmitButton();
              });
            }

            eventsContainer.appendChild(btn);
          });
        }
      });
      calendar.render();
    }

    function updateSubmitButton() {
      const count = Object.keys(selectedSlots).length;
      document.getElementById('select-count').innerText = count;
      document.getElementById('submit-btn').disabled = (count === 0);
    }

    document.getElementById('submit-btn').addEventListener('click', function() {
      const btn = this;
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 送信中...`;

      const payload = {
        userName: userName,
        selections: Object.values(selectedSlots)
      };

      const encodedData = encodeURIComponent(JSON.stringify(payload));
      const finalUrl = `${GAS_URL}?action=submitShift&data=${encodedData}`;

      fetch(finalUrl, { method: "GET" })
      .then(res => res.json())
      .then(result => {
        if (result.result === "success") {
          alert("シフト希望を提出しました！先着判定の上、シートに記録されました。");
          selectedSlots = {};
          initSystem(); 
        } else {
          alert("エラー: " + result.message);
          btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> シフトを提出する`;
          btn.disabled = false;
        }
      })
      .catch(err => {
        alert("送信処理を完了しました。最新の状況に更新します。");
        selectedSlots = {};
        initSystem();
      });
    });
  </script>
</body>
</html>
