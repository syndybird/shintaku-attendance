<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHINTAKU WORKS シフト予約</title>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    .fc-daygrid-day-events { display: flex; flex-direction: column; gap: 6px; padding: 2px !important; }
    .slot-block { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 1px; }
    .slot-label-top { font-size: 10px; font-weight: 800; color: #000000; text-align: center; line-height: 1; margin-bottom: 2px; }
    .slot-btn-box { width: 100%; text-align: center; padding: 4px 0; font-size: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; user-select: none; transition: all 0.2s; white-space: nowrap; }

    /* カラークラス */
    .bg-green-slot { background-color: #22c55e; color: #ffffff; }  
    .bg-red-slot { background-color: #ef4444; color: #ffffff; cursor: not-allowed; }    
    .bg-blue-slot { background-color: #3b82f6; color: #ffffff; border: 1px solid #1d4ed8; }   
    .bg-purple-slot { background-color: #a855f7; color: #ffffff; cursor: not-allowed; } 
    .bg-sky-slot { background-color: #38bdf8; color: #ffffff; } 
    .bg-yellow-slot { background-color: #eab308; color: #ffffff; border: 1px solid #a16207; } 
    .bg-past-slot { background-color: #cbd5e1 !important; color: #64748b !important; border: none !important; cursor: not-allowed !important; opacity: 0.6; }

    .fc-day-sat .fc-col-header-cell-cushion, .fc-day-sat .fc-daygrid-day-number { color: #2563eb !important; font-weight: bold; } 
    .fc-day-sun .fc-col-header-cell-cushion, .fc-day-sun .fc-daygrid-day-number { color: #dc2626 !important; font-weight: bold; } 
  </style>
</head>
<body class="bg-slate-100 font-sans min-height-screen pb-36">

  <div id="loading-screen" class="fixed inset-0 bg-slate-100 flex flex-col justify-center items-center z-[100]">
    <i class="fa-solid fa-spinner animate-spin text-blue-900 text-4xl mb-4"></i>
    <p class="text-slate-600 font-bold">アクセス権限を確認中...</p>
  </div>

  <div id="gate-screen" class="hidden fixed inset-0 bg-slate-50 flex flex-col justify-center items-center p-6 text-center z-[90]">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full border border-slate-200 flex flex-col items-center">
      <i class="fa-solid fa-circle-xmark text-red-500 text-5xl mb-4"></i>
      <h2 class="text-xl font-bold text-slate-800 mb-2">アクセス権限がありません</h2>
      <p class="text-sm text-slate-500 leading-relaxed">
        このシステムは、しんたく牧場の登録スタッフ専用です。<br>利用するには管理者に連絡してください。
      </p>
    </div>
  </div>

  <div id="main-content" class="hidden">
    <header class="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
      <h1 class="text-xl font-bold"><i class="fa-solid fa-calendar-days mr-2"></i>シフト希望提出</h1>
      <div id="user-info" class="text-sm bg-blue-800 px-3 py-1 rounded">ログイン中...</div>
    </header>

    <div class="max-w-md mx-auto m-3 p-3 bg-white rounded-lg shadow-sm grid grid-cols-6 gap-1 text-center text-[10px] font-bold">
      <div class="p-1 bg-green-500 text-white rounded">緑:予約可</div>
      <div class="p-1 bg-blue-500 text-white rounded">青:本人予約</div>
      <div class="p-1 bg-purple-500 text-white rounded">紫:他人予約</div>
      <div class="p-1 bg-sky-400 text-white rounded">水色:確定</div>
      <div class="p-1 bg-yellow-500 text-white rounded">黄:直近変更</div>
      <div class="p-1 bg-red-500 text-white rounded">赤:予約済</div>
    </div>

    <div class="max-w-md mx-auto p-2 bg-white rounded-lg shadow-md m-3">
      <div id="calendar"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white shadow-lg border-t border-slate-200 flex flex-col items-center gap-2 z-50">
      <button id="submit-btn" class="w-full max-w-md bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md flex justify-center items-center gap-2 transition disabled:bg-slate-400" disabled>
        <i class="fa-solid fa-paper-plane"></i> シフトを提出する (<span id="select-count">0</span>)
      </button>
      <button id="close-btn" class="w-full max-w-md bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 rounded-xl text-sm flex justify-center items-center gap-2 transition">
        <i class="fa-solid fa-xmark"></i> 提出せずに画面を閉じる
      </button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxP7Xw2nUEUhdh8Nqtr7fOo7qz2VcJfOwy83Sh6nGv3NnfxaBpbPMUpskXy8B1wqGg0/exec";
    const LIFF_ID = "2010136950-3fse6ErK";

    const FIXED_DAYS = 7;      
    const RECRUIT_DAYS = 14;   

    let userName = ""; 
    let userId = ""; 
    let currentSheetData = []; 
    let selectedSlots = {};   

    document.addEventListener("DOMContentLoaded", function() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            liff.getProfile().then(profile => {
              userName = profile.displayName.trim(); 
              userId = profile.userId; 
              checkUserAccess();
            });
          }
        }).catch(err => {
          alert("LINEログインの初期化に失敗しました。LINEアプリ内から開き原してください。");
        });
    });

    function checkUserAccess() {
      fetch(`${GAS_URL}?action=checkUser&userId=${userId}`)
        .then(res => res.json())
        .then(result => {
          document.getElementById("loading-screen").classList.add("hidden");
          
          if (result.access === "granted") {
            document.getElementById("main-content").classList.remove("hidden");
            document.getElementById("user-info").innerText = "👤 " + userName;
            initSystem();
          } else {
            // 知らない人の場合はこの拒否画面を出し、裏のカレンダーやボタンは1ミリも描画しません
            document.getElementById("gate-screen").classList.remove("hidden");
          }
        })
        .catch(err => {
          document.getElementById("loading-screen").className = "fixed inset-0 bg-slate-100 flex flex-col justify-center items-center z-[100] text-red-600 font-bold p-4 text-center";
          document.getElementById("loading-screen").innerHTML = "<i class='fa-solid fa-triangle-exclamation text-3xl mb-2'></i><br>通信エラーが発生しました。再度お試しください。";
        });
    }

    function initSystem() {
      fetch(`${GAS_URL}?action=getShift`)
        .then(res => res.json())
        .then(data => {
          currentSheetData = data;
          renderCalendar();
        }).catch(err => {
          alert("シフトデータの取得に失敗しました。");
        });
    }

    function renderCalendar() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const endOfFixedDate = new Date(today);
      endOfFixedDate.setDate(endOfFixedDate.getDate() + FIXED_DAYS);

      const endOfRecruitDate = new Date(today);
      endOfRecruitDate.setDate(endOfRecruitDate.getDate() + FIXED_DAYS + RECRUIT_DAYS);

      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'ja',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        height: 'auto',
        dayCellContent: function(e) { return e.dayNumberText.replace('日', ''); },

        dayCellDidMount: function(info) {
          const y = info.date.getFullYear();
          const m = String(info.date.getMonth() + 1).padStart(2, '0');
          const d = String(info.date.getDate()).padStart(2, '0');
          const dateStr = `${y}-${m}-${d}`;

          const cellDate = new Date(info.date);
          cellDate.setHours(0, 0, 0, 0);

          const isPast = cellDate < today; 
          const isFixedPeriod = cellDate <= endOfFixedDate; 
          const isTooFuture = cellDate > endOfRecruitDate; 

          const eventsContainer = info.el.querySelector('.fc-daygrid-day-events');
          if (!eventsContainer) return;
          eventsContainer.innerHTML = ''; 

          ['AM', 'PM'].forEach(slot => {
            const blockDiv = document.createElement('div');
            blockDiv.className = 'slot-block';

            const labelSpan = document.createElement('span');
            labelSpan.className = 'slot-label-top';
            labelSpan.innerText = slot;
            blockDiv.appendChild(labelSpan);

            const btn = document.createElement('div');
            btn.className = 'slot-btn-box';

            const match = currentSheetData.find(d => d.date === dateStr && d.slot === slot);
            
            const sheetStatus = match && match.status ? String(match.status).trim() : "";
            const sheetUid = match && match.userId ? String(match.userId).trim() : "";

            const isMyName = (sheetUid !== "" && sheetUid === userId);

            if (isPast) {
              if (sheetStatus === '確定' && isMyName) {
                btn.classList.add('bg-sky-slot');
                btn.innerText = '確定';
                btn.dataset.status = 'confirmed_lock';
              } else {
                btn.classList.add('bg-past-slot');
                btn.innerText = '終了';  
                btn.dataset.status = 'past_lock';
              }

            } else if (isTooFuture) {
              btn.classList.add('bg-past-slot');
              btn.innerText = '期間外';
              btn.dataset.status = 'future_lock';

            } else if (isFixedPeriod) {
              if (match) {
                if (sheetStatus === '確定' && isMyName) {
                  btn.classList.add('bg-sky-slot');
                  btn.innerText = '確定';
                  btn.dataset.status = 'my_fixed_urgent';
                } else if (sheetStatus === '変更申請中' && isMyName) {
                  btn.classList.add('bg-yellow-slot');
                  btn.innerText = '変更申請';
                  btn.dataset.status = 'my_fixed_urgent_active';
                  selectedSlots[`${dateStr}_${slot}`] = { date: dateStr, slot: slot, mode: 'urgent_change' };
                } else {
                  btn.classList.add('bg-red-slot');
                  btn.innerText = '予約済';
                  btn.dataset.status = 'other_fixed_lock';
                }
              } else {
                btn.classList.add('bg-green-slot');
                btn.innerText = '予約可';
                btn.dataset.status = 'available';
              }

            } else {
              if (match) {
                if (sheetStatus === '確定') {
                  if (isMyName) {
                    btn.classList.add('bg-sky-slot');
                    btn.innerText = '確定';
                    btn.dataset.status = 'confirmed_lock';
                  } else {
                    btn.classList.add('bg-red-slot');
                    btn.innerText = '予約済';
                    btn.dataset.status = 'other_fixed_lock';
                  }
                } else {
                  if (isMyName) {
                    btn.classList.add('bg-blue-slot');
                    btn.innerText = '選択中';
                    btn.dataset.status = 'already_reserved_by_me';
                    selectedSlots[`${dateStr}_${slot}`] = { date: dateStr, slot: slot, mode: 'normal' };
                  } else {
                    btn.classList.add('bg-purple-slot');
                    btn.innerText = '他人の予約';
                    btn.dataset.status = 'other_reserved_lock';
                  }
                }
              } else {
                btn.classList.add('bg-green-slot');
                btn.innerText = '予約可';
                btn.dataset.status = 'available';
              }
            }

            // クリックイベント
            const status = btn.dataset.status;
            if (status !== 'confirmed_lock' && status !== 'past_lock' && status !== 'future_lock' && status !== 'other_fixed_lock' && status !== 'other_reserved_lock') {
              btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const key = `${dateStr}_${slot}`;

                if (btn.dataset.status === 'available') {
                  if (selectedSlots[key]) {
                    delete selectedSlots[key];
                    btn.className = 'slot-btn-box bg-green-slot';
                    btn.innerText = '予約可';
                  } else {
                    selectedSlots[key] = { date: dateStr, slot: slot, mode: 'normal' };
                    btn.className = 'slot-btn-box bg-blue-slot';
                    btn.innerText = '選択中';
                  }
                } else if (btn.dataset.status === 'already_reserved_by_me') {
                  if (!selectedSlots[key]) {
                    selectedSlots[key] = { date: dateStr, slot: slot, mode: 'normal' };
                    btn.className = 'slot-btn-box bg-blue-slot';
                    btn.innerText = '選択中';
                  } else {
                    delete selectedSlots[key];
                    btn.className = 'slot-btn-box bg-green-slot';
                    btn.innerText = '予約可';
                  }
                } else if (btn.dataset.status === 'my_fixed_urgent' || btn.dataset.status === 'my_fixed_urgent_active') {
                  if (!selectedSlots[key]) {
                    selectedSlots[key] = { date: dateStr, slot: slot, mode: 'urgent_change' };
                    btn.className = 'slot-btn-box bg-yellow-slot';
                    btn.innerText = '変更申請';
                  } else {
                    delete selectedSlots[key];
                    btn.className = 'slot-btn-box bg-sky-slot';
                    btn.innerText = '確定';
                  }
                }
                updateSubmitButton();
              });
            }

            blockDiv.appendChild(btn);
            eventsContainer.appendChild(blockDiv);
          });
        }
      });
      calendar.render();
      updateSubmitButton(); 
    }

    function updateSubmitButton() {
      const count = Object.keys(selectedSlots).length;
      document.getElementById('select-count').innerText = count;
      document.getElementById('submit-btn').disabled = (count === 0); 
    }

    document.getElementById('close-btn').addEventListener('click', function() {
      if (liff.isInClient()) {
        liff.closeWindow(); 
      }
    });

    document.getElementById('submit-btn').addEventListener('click', function() {
      const btn = this;
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 送信中...`;

      const payload = {
        userName: userName,
        userId: userId, 
        selections: Object.values(selectedSlots)
      };

      const encodedData = encodeURIComponent(JSON.stringify(payload));
      const finalUrl = `${GAS_URL}?action=submitShift&data=${encodedData}`;

      fetch(finalUrl, { method: "GET" })
      .then(res => res.json())
      .then(result => {
        if (result.result === "success") {
          alert("シフト希望を提出しました！");
          selectedSlots = {};
          initSystem(); 
        } else {
          alert("エラー: " + result.message);
          btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> シフトを提出する`;
          btn.disabled = false;
        }
      })
      .catch(err => {
        alert("送信処理を完了しました。最新の状況に更新します。");
        selectedSlots = {};
        initSystem();
      });
    });
  </script>
</body>
</html>
