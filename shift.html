<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHINTAKU WORKS シフト予約</title>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --ink: #172026;
      --muted: #66737c;
      --paper: #fffdf8;
      --surface: rgba(255, 255, 255, 0.88);
      --line: rgba(24, 48, 40, 0.12);
      --brand: #315f52;
      --brand-dark: #18382f;
      --sage: #9fb8a8;
      --mist: #dce9e6;
      --cream: #f7f1e7;
      --apricot: #e8a26d;
    }

    html {
      background: #f4f0e8;
    }

    body {
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 8%, rgba(159, 184, 168, 0.28), transparent 28%),
        radial-gradient(circle at 88% 0%, rgba(232, 162, 109, 0.18), transparent 26%),
        linear-gradient(180deg, #f8f4ec 0%, #eef4f1 100%);
      -webkit-font-smoothing: antialiased;
    }

    .app-shell {
      max-width: 520px;
      margin: 0 auto;
      padding: 14px 14px 148px;
    }

    .top-card {
      position: sticky;
      top: 0;
      z-index: 50;
      margin: 0 -14px 14px;
      padding: 14px 16px 16px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(24, 56, 47, 0.98), rgba(49, 95, 82, 0.96)),
        radial-gradient(circle at top right, rgba(232, 162, 109, 0.35), transparent 35%);
      box-shadow: 0 14px 34px rgba(24, 56, 47, 0.22);
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(12px);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      letter-spacing: 0.02em;
      line-height: 1.15;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.14);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    .brand-kicker {
      display: block;
      font-size: 10px;
      letter-spacing: 0.16em;
      color: rgba(255, 255, 255, 0.72);
      margin-bottom: 2px;
    }

    #user-info {
      flex-shrink: 0;
      max-width: 42%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 800;
      padding: 8px 10px;
      border-radius: 999px;
      color: #17352d;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 7px 18px rgba(0, 0, 0, 0.12);
    }

    .guide-card,
    .calendar-card {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 24px;
      box-shadow: 0 18px 48px rgba(37, 56, 48, 0.12);
      backdrop-filter: blur(16px);
    }

    .guide-card {
      padding: 12px;
      margin-bottom: 12px;
    }

    .guide-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 10px;
      padding: 0 2px;
    }

    .legend-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }

    .legend-item {
      min-height: 46px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      border-radius: 16px;
      font-size: 10px;
      font-weight: 900;
      line-height: 1.1;
      color: #fff;
      box-shadow: 0 8px 18px rgba(24, 48, 40, 0.12);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.85);
    }

    .calendar-card {
      padding: 12px 10px 14px;
      overflow: hidden;
    }

    /* FullCalendar 全体調整 */
    .fc {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    .fc .fc-toolbar.fc-header-toolbar {
      margin-bottom: 12px;
      padding: 2px 2px 8px;
    }

    .fc .fc-toolbar-title {
      font-size: 18px;
      font-weight: 950;
      letter-spacing: 0.02em;
      color: var(--brand-dark);
    }

    .fc .fc-button-primary {
      border: 0 !important;
      border-radius: 999px !important;
      background: #edf4f1 !important;
      color: var(--brand-dark) !important;
      box-shadow: inset 0 0 0 1px rgba(49, 95, 82, 0.12), 0 7px 16px rgba(37, 56, 48, 0.08) !important;
      font-weight: 900 !important;
    }

    .fc .fc-button-primary:focus,
    .fc .fc-button-primary:active {
      box-shadow: inset 0 0 0 1px rgba(49, 95, 82, 0.22), 0 7px 16px rgba(37, 56, 48, 0.12) !important;
    }

    .fc-theme-standard .fc-scrollgrid,
    .fc-theme-standard td,
    .fc-theme-standard th {
      border-color: var(--line) !important;
    }

    .fc-theme-standard .fc-scrollgrid {
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.64);
    }

    .fc .fc-col-header-cell {
      background: rgba(237, 244, 241, 0.9);
      padding: 5px 0;
    }

    .fc .fc-col-header-cell-cushion {
      color: #49615a;
      font-size: 11px;
      font-weight: 950;
      text-decoration: none;
    }

    .fc .fc-daygrid-day {
      background: rgba(255, 255, 255, 0.52);
    }

    .fc .fc-daygrid-day.fc-day-today {
      background: rgba(232, 162, 109, 0.13) !important;
    }

    .fc .fc-daygrid-day-number {
      padding: 5px 6px 0 0;
      font-size: 11px;
      font-weight: 900;
      color: #394942;
      text-decoration: none;
    }

    .fc .fc-day-other {
      background: rgba(244, 240, 232, 0.56);
    }

    .fc .fc-day-other .slot-block {
      opacity: 0.42;
    }

    /* カレンダーのマス全体のイベントコンテナ調整 */
    .fc-daygrid-day-events {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 2px 3px 5px !important;
      min-height: 62px !important;
    }

    /* 上下に「文字」と「ボタン」を並べるためのコンテナ */
    .slot-block {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      gap: 2px;
    }

    /* ボタンのすぐ上に表示するAM/PMテキスト */
    .slot-label-top {
      font-size: 9px;
      font-weight: 950;
      color: #38524a;
      text-align: center;
      line-height: 1;
      letter-spacing: 0.08em;
    }

    /* 文字を入れる四角いボタン */
    .slot-btn-box {
      width: 100%;
      text-align: center;
      padding: 5px 0;
      font-size: 10px;
      font-weight: 950;
      border-radius: 10px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      white-space: nowrap;
      letter-spacing: 0.02em;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.22), 0 6px 12px rgba(37, 56, 48, 0.11);
    }

    .slot-btn-box:active {
      transform: scale(0.96);
      filter: brightness(0.98);
    }

    /* カラーロジック：クラス名はJSが使うため絶対維持 */
    .bg-green-slot {
      background: linear-gradient(135deg, #7fae92, #4f8c70) !important;
      color: #ffffff !important;
    }

    .bg-red-slot {
      background: linear-gradient(135deg, #d88478, #b65c55) !important;
      color: #ffffff !important;
    }

    .bg-blue-slot {
      background: linear-gradient(135deg, #6f9fc8, #3f75a6) !important;
      color: #ffffff !important;
      outline: 2px solid rgba(255, 255, 255, 0.65) !important;
      outline-offset: -3px !important;
    }

    .bg-purple-slot {
      background: linear-gradient(135deg, #a889c5, #7b5aa3) !important;
      color: #ffffff !important;
    }

    .bg-sky-slot {
      background: linear-gradient(135deg, #8fc6d6, #5fa8bd) !important;
      color: #ffffff !important;
      cursor: not-allowed !important;
      opacity: 0.92 !important;
    }

    /* 土日の曜日カラー変更 */
    .fc-day-sat .fc-col-header-cell-cushion,
    .fc-day-sat .fc-daygrid-day-number {
      color: #3f75a6 !important;
      font-weight: 950;
    }

    .fc-day-sun .fc-col-header-cell-cushion,
    .fc-day-sun .fc-daygrid-day-number {
      color: #b65c55 !important;
      font-weight: 950;
    }

    .action-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 50;
      padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
      background: rgba(255, 253, 248, 0.92);
      border-top: 1px solid rgba(24, 48, 40, 0.12);
      box-shadow: 0 -18px 45px rgba(37, 56, 48, 0.13);
      backdrop-filter: blur(18px);
    }

    .action-inner {
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    #submit-btn,
    #close-btn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      font-weight: 950;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    #submit-btn {
      padding: 14px 16px;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      box-shadow: 0 14px 28px rgba(24, 56, 47, 0.25);
    }

    #submit-btn:disabled {
      opacity: 0.42;
      background: #9daaa4;
      box-shadow: none;
    }

    #submit-btn:not(:disabled):active,
    #close-btn:active {
      transform: scale(0.985);
    }

    #close-btn {
      padding: 11px 16px;
      color: #40524b;
      background: rgba(237, 244, 241, 0.96);
      box-shadow: inset 0 0 0 1px rgba(49, 95, 82, 0.12);
      font-size: 13px;
    }

    @media (max-width: 390px) {
      .app-shell {
        padding-left: 10px;
        padding-right: 10px;
      }

      .legend-grid {
        gap: 4px;
      }

      .legend-item {
        min-height: 42px;
        border-radius: 14px;
        font-size: 9px;
      }

      .slot-btn-box {
        font-size: 9px;
        border-radius: 8px;
      }

      .fc .fc-toolbar-title {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <header class="top-card">
    <div class="brand-row">
      <h1 class="brand-title">
        <span class="brand-icon"><i class="fa-solid fa-calendar-days"></i></span>
        <span>
          <span class="brand-kicker">SHINTAKU WORKS</span>
          シフト希望提出
        </span>
      </h1>
      <div id="user-info">読み込み中...</div>
    </div>
  </header>

  <main class="app-shell">
    <section class="guide-card" aria-label="ステータス説明">
      <div class="guide-title">
        <span><i class="fa-solid fa-list-check"></i> ステータス</span>
        <span>AM / PM を選択</span>
      </div>
      <div class="legend-grid text-center">
        <div class="legend-item bg-green-slot"><span class="legend-dot"></span><span>予約可</span></div>
        <div class="legend-item bg-red-slot"><span class="legend-dot"></span><span>予約済</span></div>
        <div class="legend-item bg-sky-slot"><span class="legend-dot"></span><span>確定</span></div>
        <div class="legend-item bg-blue-slot"><span class="legend-dot"></span><span>選択中</span></div>
        <div class="legend-item bg-purple-slot"><span class="legend-dot"></span><span>競合中</span></div>
      </div>
    </section>

    <section class="calendar-card">
      <div id="calendar"></div>
    </section>
  </main>

  <div class="action-bar">
    <div class="action-inner">
      <button id="submit-btn" disabled>
        <i class="fa-solid fa-paper-plane"></i> シフトを提出する (<span id="select-count">0</span>)
      </button>
      <button id="close-btn">
        <i class="fa-solid fa-xmark"></i> 提出せずに画面を閉じる
      </button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxm7UaGS-K8ifm6zbqja199RqTt2GzIlRoMzGHjYjGW3TU_SlrtoJaz5vAw4GmQi0Wi/exec";
    
    let userName = "テストユーザー"; 
    let currentSheetData = []; 
    let selectedSlots = {};   

    // LIFF初期化
    document.addEventListener("DOMContentLoaded", function() {
      liff.init({ liffId: "2010136950-uGfcZEcw" })
        .then(() => {
          if (!liff.isInClient() && !liff.isLoggedIn()) {
            console.log("外部ブラウザ検知: テストモード起動");
            document.getElementById("user-info").innerText = "⚠️ PCテストモード";
            initSystem();
          } else {
            if (!liff.isLoggedIn()) {
              liff.login();
            } else {
              liff.getProfile().then(profile => {
                userName = profile.displayName;
                document.getElementById("user-info").innerText = "👤 " + userName;
                initSystem();
              });
            }
          }
        }).catch(err => {
          console.log("LIFF初期化失敗、テストモードで起動");
          document.getElementById("user-info").innerText = "⚠️ テストモード";
          initSystem();
        });
    });

    function initSystem() {
      fetch(`${GAS_URL}?action=getShift`)
        .then(res => res.json())
        .then(data => {
          currentSheetData = data;
          renderCalendar();
        }).catch(err => {
          alert("データ通信に失敗しました。電波の良い場所で再開してください。");
          renderCalendar();
        });
    }

    function renderCalendar() {
      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'ja',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        height: 'auto',
        dayCellContent: function(e) { return e.dayNumberText.replace('日', ''); },
        
        dayCellDidMount: function(info) {
          const y = info.date.getFullYear();
          const m = String(info.date.getMonth() + 1).padStart(2, '0');
          const d = String(info.date.getDate()).padStart(2, '0');
          const dateStr = `${y}-${m}-${d}`;

          const eventsContainer = info.el.querySelector('.fc-daygrid-day-events');
          if (!eventsContainer) return;
          eventsContainer.innerHTML = ''; 

          ['AM', 'PM'].forEach(slot => {
            const blockDiv = document.createElement('div');
            blockDiv.className = 'slot-block';

            const labelSpan = document.createElement('span');
            labelSpan.className = 'slot-label-top';
            labelSpan.innerText = slot;
            blockDiv.appendChild(labelSpan);

            const btn = document.createElement('div');
            btn.className = 'slot-btn-box';
            
            const match = currentSheetData.find(d => d.date === dateStr && d.slot === slot);
            
            if (match) {
              if (match.status === '確定') {
                btn.className = 'slot-btn-box bg-sky-slot';
                btn.innerText = '確定';
                btn.dataset.status = 'confirmed';
              } else if (match.status === '予約済み') {
                btn.className = 'slot-btn-box bg-red-slot';
                btn.innerText = '予約済';
                btn.dataset.status = 'reserved';
              } else if (match.status === '競合') {
                btn.className = 'slot-btn-box bg-purple-slot';
                btn.innerText = '競合中';
                btn.dataset.status = 'conflict';
              }
            } else {
              btn.className = 'slot-btn-box bg-green-slot';
              btn.innerText = '予約可';
              btn.dataset.status = 'available';
            }

            if (btn.dataset.status !== 'confirmed') {
              btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const key = `${dateStr}_${slot}`;

                if (btn.dataset.status === 'available') {
                  if (selectedSlots[key]) {
                    delete selectedSlots[key];
                    btn.className = 'slot-btn-box bg-green-slot';
                    btn.innerText = '予約可';
                  } else {
                    selectedSlots[key] = { date: dateStr, slot: slot, mode: 'normal' };
                    btn.className = 'slot-btn-box bg-blue-slot';
                    btn.innerText = '選択中';
                  }
                } else if (btn.dataset.status === 'reserved' || btn.dataset.status === 'conflict') {
                  if (selectedSlots[key]) {
                    delete selectedSlots[key];
                    btn.className = `slot-btn-box ${match.status === '予約済み' ? 'bg-red-slot' : 'bg-purple-slot'}`;
                    btn.innerText = match.status === '予約済み' ? '予約済' : '競合中';
                  } else {
                    selectedSlots[key] = { date: dateStr, slot: slot, mode: 'force' };
                    btn.className = 'slot-btn-box bg-purple-slot';
                    btn.innerText = '競合中';
                  }
                }
                updateSubmitButton();
              });
            }

            blockDiv.appendChild(btn);
            eventsContainer.appendChild(blockDiv);
          });
        }
      });
      calendar.render();
    }

    function updateSubmitButton() {
      const count = Object.keys(selectedSlots).length;
      document.getElementById('select-count').innerText = count;
      document.getElementById('submit-btn').disabled = (count === 0);
    }

    document.getElementById('close-btn').addEventListener('click', function() {
      if (liff.isInClient()) {
        liff.closeWindow(); 
      } else {
        alert("PC環境のため、ブラウザのタブを直接閉じるか、前の画面に戻ってください。");
      }
    });

    document.getElementById('submit-btn').addEventListener('click', function() {
      const btn = this;
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 送信中...`;

      const payload = {
        userName: userName,
        selections: Object.values(selectedSlots)
      };

      const encodedData = encodeURIComponent(JSON.stringify(payload));
      const finalUrl = `${GAS_URL}?action=submitShift&data=${encodedData}`;

      const forceRefreshTimeout = setTimeout(() => {
        alert("シフト希望を受け付けました！(最新の状態に更新します)");
        selectedSlots = {};
        initSystem();
      }, 1200);

      fetch(finalUrl, { method: "GET", mode: "no-cors" })
      .then(() => {
        clearTimeout(forceRefreshTimeout);
        alert("シフト希望を提出しました！先着判定の上、シートに記録されました。");
        selectedSlots = {};
        initSystem(); 
      })
      .catch(err => {
        clearTimeout(forceRefreshTimeout);
        alert("シフト希望の送信処理を完了しました。カレンダーを更新します。");
        selectedSlots = {};
        initSystem();
      });
    });
  </script>
</body>
</html>
