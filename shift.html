<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SHINTAKU WORKS シフト予約</title>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="config.js"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <style>
    /* CSS変数はconfig.jsから自動適用されます */

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: var(--font-body), -apple-system, sans-serif;
      min-height: 100vh;
      padding-bottom: 120px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 20%, rgba(0,0,0,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== ローディング ===== */
    #loading-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 100;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--divider);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-screen p {
      font-size: 13px;
      color: var(--text-sub);
      letter-spacing: 0.05em;
    }

    /* ===== アクセス拒否 ===== */
    #gate-screen {
      display: none;
      position: fixed; inset: 0;
      background: var(--bg);
      justify-content: center; align-items: center;
      padding: 24px;
      z-index: 90;
    }

    .gate-card {
      background: var(--card);
      border-radius: 20px;
      padding: 40px 28px;
      text-align: center;
      max-width: 340px;
      width: 100%;
      border: 1px solid var(--divider);
      box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    }

    .gate-icon {
      font-size: 40px;
      color: #ef4444;
      margin-bottom: 16px;
    }

    .gate-card h2 {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 10px;
    }

    .gate-card p {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.8;
    }

    /* ===== メインコンテンツ ===== */
    #main-content { display: none; position: relative; z-index: 1; }

    /* ===== ヘッダー ===== */
    header {
      background: var(--brand);
      color: #fff;
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left .brand-name {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .header-left .brand-sub {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      margin-top: 1px;
    }

    .user-badge {
      font-size: 12px;
      font-weight: 500;
      background: rgba(255,255,255,0.12);
      padding: 6px 12px;
      border-radius: 20px;
      letter-spacing: 0.02em;
    }

    /* ===== 凡例 ===== */
    .legend {
      max-width: 480px;
      margin: 12px auto;
      padding: 12px 16px;
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--divider);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-main);
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ===== カレンダーラッパー ===== */
    .cal-wrap {
      max-width: 480px;
      margin: 0 auto 12px;
      padding: 0 12px;
    }

    .cal-card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--divider);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      padding: 12px 8px 16px;
    }

    /* ===== FullCalendar カスタマイズ ===== */
    .fc .fc-toolbar-title {
      font-family: var(--font-display);
      font-size: 16px !important;
      font-weight: 800;
      color: var(--text-main);
    }

    .fc .fc-button {
      background: var(--brand) !important;
      border-color: var(--brand) !important;
      border-radius: 8px !important;
      font-size: 12px !important;
      padding: 4px 10px !important;
    }

    .fc .fc-col-header-cell-cushion {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .fc-day-sat .fc-col-header-cell-cushion,
    .fc-day-sat .fc-daygrid-day-number { color: #2563eb !important; font-weight: 700; }
    .fc-day-sun .fc-col-header-cell-cushion,
    .fc-day-sun .fc-daygrid-day-number { color: #dc2626 !important; font-weight: 700; }

    .fc .fc-daygrid-day-number {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      padding: 2px 4px;
    }

    .fc .fc-daygrid-day-events {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 2px 2px 4px !important;
    }

    /* ===== スロットブロック ===== */
    .slot-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 1px;
    }

    .slot-label {
      font-size: 9px;
      font-weight: 800;
      color: var(--text-sub);
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 1px;
    }

    .slot-btn {
      width: 100%;
      text-align: center;
      padding: 3px 1px;
      font-size: 9px;
      font-weight: 700;
      border-radius: 5px;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .slot-btn:active { transform: scale(0.95); }

    .slot-open    { background: var(--slot-open);   color: var(--slot-open-txt); }
    .slot-mine    { background: var(--slot-mine);   color: var(--slot-mine-txt); }
    .slot-other   { background: var(--slot-other);  color: var(--slot-other-txt); cursor: not-allowed; }
    .slot-fixed   { background: var(--slot-fixed);  color: var(--slot-fixed-txt); }
    .slot-change  { background: var(--slot-change); color: var(--slot-change-txt); }
    .slot-lock    { background: var(--slot-lock);   color: var(--slot-lock-txt); cursor: not-allowed; }
    .slot-past    { background: var(--slot-past);   color: var(--slot-past-txt); cursor: not-allowed; opacity: 0.7; }

    /* ===== フッターボタン ===== */
    .footer-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--card);
      border-top: 1px solid var(--divider);
      padding: 12px 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 50;
    }

    .btn-submit {
      width: 100%;
      max-width: 480px;
      background: var(--brand);
      color: #fff;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 15px 24px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-close {
      width: 100%;
      max-width: 480px;
      background: transparent;
      color: var(--text-sub);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      padding: 8px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }

    .btn-close:hover { color: var(--text-main); }

    .count-badge {
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 2px 9px;
      font-size: 13px;
    }

    /* ===== フェードイン ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #main-content.visible {
      animation: fadeUp 0.4s ease both;
    }
  </style>
</head>
<body>

  <!-- ローディング -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>アクセス権限を確認中...</p>
  </div>

  <!-- アクセス拒否 -->
  <div id="gate-screen">
    <div class="gate-card">
      <div class="gate-icon"><i class="fa-solid fa-circle-xmark"></i></div>
      <h2>アクセス権限がありません</h2>
      <p>このシステムは登録スタッフ専用です。<br>利用するには管理者に連絡してください。</p>
    </div>
  </div>

  <!-- メイン -->
  <div id="main-content">

    <header>
      <div class="header-left">
        <div class="brand-name">Shintaku Works</div>
        <div class="brand-sub">Shift Request</div>
      </div>
      <div class="user-badge" id="user-info">読込中...</div>
    </header>

    <!-- 凡例 -->
    <div class="cal-wrap" style="margin-top:12px;">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--slot-open)"></div>予約可</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--slot-mine)"></div>自分の予約</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--slot-other)"></div>他人の予約</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--slot-fixed)"></div>確定済み</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--slot-change)"></div>変更申請</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--slot-lock)"></div>ロック</div>
      </div>
    </div>

    <!-- カレンダー -->
    <div class="cal-wrap">
      <div class="cal-card">
        <div id="calendar"></div>
      </div>
    </div>

  </div>

  <!-- フッター -->
  <div class="footer-bar" id="footer-bar" style="display:none;">
    <button class="btn-submit" id="submit-btn" disabled>
      <i class="fa-solid fa-paper-plane"></i>
      シフトを提出する
      <span class="count-badge" id="select-count">0</span>
    </button>
    <button class="btn-close" id="close-btn">
      <i class="fa-solid fa-xmark"></i> 提出せずに閉じる
    </button>
  </div>

  <script>
    const GAS_URL = CONFIG.GAS_URL;
    const LIFF_ID = CONFIG.LIFF_ID_SHIFT;

    const FIXED_DAYS   = 7;
    const RECRUIT_DAYS = 14;

    let userName = "";
    let userId   = "";
    let currentSheetData = [];
    let selectedSlots = {};

    // ===== LIFF初期化 =====
    document.addEventListener("DOMContentLoaded", function() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            liff.getProfile().then(profile => {
              userName = profile.displayName.trim();
              userId   = profile.userId;
              checkUserAccess();
            }).catch(() => showError("プロフィール取得に失敗しました"));
          }
        }).catch(() => showError("LIFF初期化に失敗しました"));
    });

    // ===== ユーザーアクセス確認 =====
    function checkUserAccess() {
      fetch(`${GAS_URL}?action=checkUser&userId=${encodeURIComponent(userId)}`, { method: "GET", redirect: "follow" })
        .then(res => res.json())
        .then(result => {
          document.getElementById("loading-screen").style.display = "none";
          if (result.access === "granted") {
            const mc = document.getElementById("main-content");
            mc.style.display = "block";
            mc.classList.add("visible");
            document.getElementById("footer-bar").style.display = "flex";
            document.getElementById("user-info").innerText = "👤 " + userName;
            initSystem();
          } else {
            document.getElementById("gate-screen").style.display = "flex";
          }
        })
        .catch(err => showError("アクセス確認に失敗しました: " + err.message));
    }

    // ===== システム初期化 =====
    function initSystem() {
      fetch(`${GAS_URL}?action=getShift`, { method: "GET", redirect: "follow" })
        .then(res => res.json())
        .then(data => {
          currentSheetData = data;
          renderCalendar();
        }).catch(() => showError("シフトデータ取得に失敗しました"));
    }

    // ===== カレンダーレンダリング =====
    function renderCalendar() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const endFixed   = new Date(today); endFixed.setDate(today.getDate() + FIXED_DAYS);
      const endRecruit = new Date(today); endRecruit.setDate(today.getDate() + FIXED_DAYS + RECRUIT_DAYS);

      const calEl = document.getElementById('calendar');
      calEl.innerHTML = '';

      const calendar = new FullCalendar.Calendar(calEl, {
        initialView: 'dayGridMonth',
        locale: 'ja',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        height: 'auto',
        dayCellContent: e => e.dayNumberText.replace('日', ''),

        dayCellDidMount: function(info) {
          const d = info.date;
          const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

          const cellDate = new Date(d); cellDate.setHours(0,0,0,0);
          const isPast      = cellDate < today;
          const isFixed     = cellDate <= endFixed;
          const isTooFuture = cellDate > endRecruit;

          const container = info.el.querySelector('.fc-daygrid-day-events');
          if (!container) return;
          container.innerHTML = '';

          ['AM', 'PM'].forEach(slot => {
            const block = document.createElement('div');
            block.className = 'slot-block';

            const label = document.createElement('span');
            label.className = 'slot-label';
            label.innerText = slot;
            block.appendChild(label);

            const btn = document.createElement('div');
            btn.className = 'slot-btn';

            const match    = currentSheetData.find(x => x.date === dateStr && x.slot === slot);
            const sheetSt  = match ? String(match.status || '').trim() : '';
            const sheetUid = match ? String(match.userId || '').trim() : '';
            const isMe     = sheetUid !== '' && sheetUid === userId;
            const key      = `${dateStr}_${slot}`;

            // ステータス判定
            if (isPast) {
              if (sheetSt === '確定' && isMe) {
                btn.className += ' slot-fixed'; btn.innerText = '確定'; btn.dataset.s = 'lock';
              } else {
                btn.className += ' slot-past'; btn.innerText = '終了'; btn.dataset.s = 'lock';
              }
            } else if (isTooFuture) {
              btn.className += ' slot-past'; btn.innerText = '期間外'; btn.dataset.s = 'lock';
            } else if (isFixed) {
              if (match) {
                if (sheetSt === '確定' && isMe) {
                  btn.className += ' slot-fixed'; btn.innerText = '確定'; btn.dataset.s = 'urgent';
                } else if (sheetSt === '変更申請中' && isMe) {
                  btn.className += ' slot-change'; btn.innerText = '変更申請'; btn.dataset.s = 'urgent_active';
                  selectedSlots[key] = { date: dateStr, slot, mode: 'urgent_change' };
                } else {
                  btn.className += ' slot-lock'; btn.innerText = '予約済'; btn.dataset.s = 'lock';
                }
              } else {
                btn.className += ' slot-open'; btn.innerText = '予約可'; btn.dataset.s = 'available';
              }
            } else {
              if (match) {
                if (sheetSt === '確定') {
                  btn.className += isMe ? ' slot-fixed' : ' slot-lock';
                  btn.innerText = isMe ? '確定' : '予約済';
                  btn.dataset.s = 'lock';
                } else if (isMe) {
                  btn.className += ' slot-mine'; btn.innerText = '選択中'; btn.dataset.s = 'mine';
                  selectedSlots[key] = { date: dateStr, slot, mode: 'normal' };
                } else {
                  btn.className += ' slot-other'; btn.innerText = '他人'; btn.dataset.s = 'lock';
                }
              } else {
                btn.className += ' slot-open'; btn.innerText = '予約可'; btn.dataset.s = 'available';
              }
            }

            // クリック
            const s = btn.dataset.s;
            if (['available', 'mine', 'urgent', 'urgent_active'].includes(s)) {
              btn.addEventListener('click', e => {
                e.stopPropagation();
                if (s === 'available' || s === 'mine') {
                  if (selectedSlots[key]) {
                    delete selectedSlots[key];
                    btn.className = 'slot-btn slot-open'; btn.innerText = '予約可';
                  } else {
                    selectedSlots[key] = { date: dateStr, slot, mode: 'normal' };
                    btn.className = 'slot-btn slot-mine'; btn.innerText = '選択中';
                  }
                } else if (s === 'urgent' || s === 'urgent_active') {
                  if (!selectedSlots[key]) {
                    selectedSlots[key] = { date: dateStr, slot, mode: 'urgent_change' };
                    btn.className = 'slot-btn slot-change'; btn.innerText = '変更申請';
                  } else {
                    delete selectedSlots[key];
                    btn.className = 'slot-btn slot-fixed'; btn.innerText = '確定';
                  }
                }
                updateBtn();
              });
            }

            block.appendChild(btn);
            container.appendChild(block);
          });
        }
      });

      calendar.render();
      updateBtn();
    }

    // ===== 提出ボタン更新 =====
    function updateBtn() {
      const count = Object.keys(selectedSlots).length;
      document.getElementById('select-count').innerText = count;
      document.getElementById('submit-btn').disabled = (count === 0);
    }

    // ===== 閉じるボタン =====
    document.getElementById('close-btn').addEventListener('click', () => {
      if (liff.isInClient()) liff.closeWindow();
    });

    // ===== 提出ボタン =====
    document.getElementById('submit-btn').addEventListener('click', function() {
      const btn = this;
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 送信中...`;

      const payload = { userName, userId, selections: Object.values(selectedSlots) };
      const finalUrl = `${GAS_URL}?action=submitShift&data=${encodeURIComponent(JSON.stringify(payload))}`;

      fetch(finalUrl, { method: "GET", redirect: "follow" })
        .then(res => res.json())
        .then(result => {
          if (result.result === "success") {
            alert("シフト希望を提出しました！");
            selectedSlots = {};
            setTimeout(() => {
              btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> シフトを提出する <span class="count-badge">0</span>`;
              initSystem();
            }, 600);
          } else {
            alert("エラー: " + (result.message || "不明"));
            btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> シフトを提出する <span class="count-badge" id="select-count">0</span>`;
            btn.disabled = false;
          }
        })
        .catch(err => {
          alert("送信エラー: " + err.message);
          selectedSlots = {};
          setTimeout(() => {
            btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> シフトを提出する <span class="count-badge" id="select-count">0</span>`;
            initSystem();
          }, 600);
        });
    });

    // ===== エラー表示 =====
    function showError(msg) {
      const el = document.getElementById("loading-screen");
      el.innerHTML = `<i class="fa-solid fa-triangle-exclamation" style="font-size:32px;color:#ef4444;margin-bottom:12px;"></i><p style="color:#ef4444;font-weight:700;">${msg}</p>`;
    }
  </script>
</body>
</html>
