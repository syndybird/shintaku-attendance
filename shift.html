<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHINTAKU WORKS シフト予約</title>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --ink: #0f172a;
      --surface: rgba(255, 255, 255, 0.95);
      --line: rgba(15, 23, 42, 0.08);
    }

    html { background: #f1f5f9; }
    body {
      color: var(--ink);
      min-height: 100vh;
      background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
      -webkit-font-smoothing: antialiased;
    }

    .app-shell { max-width: 520px; margin: 0 auto; padding: 14px 14px 160px; }

    .top-card {
      position: sticky; top: 0; z-index: 50; margin: 0 -14px 14px; padding: 16px; color: #fff;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.15);
    }

    .brand-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand-title { display: flex; align-items: center; gap: 10px; font-weight: 800; }
    .brand-icon { width: 36px; height: 36px; border-radius: 12px; display: grid; place-items: center; background: rgba(255, 255, 255, 0.15); }
    .brand-kicker { display: block; font-size: 10px; font-weight: 700; color: rgba(255, 255, 255, 0.6); }

    #user-info {
      font-size: 12px; font-weight: 800; padding: 6px 12px; border-radius: 999px; color: #0f172a; background: #ffffff;
    }

    .guide-card, .calendar-card {
      background: var(--surface); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 16px;
    }
    .guide-card { padding: 14px; margin-bottom: 12px; }
    .guide-title { display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 800; margin-bottom: 10px; }

    .legend-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 6px; }
    .legend-item { padding: 8px 0; border-radius: 8px; font-size: 11px; font-weight: 800; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.2); text-align: center; }

    .calendar-card { padding: 12px; }

    /* カレンダー表示領域を確保 */
    #calendar { min-height: 400px; background: #ffffff; border-radius: 8px; padding: 4px; }

    .fc .fc-toolbar-title { font-size: 16px; font-weight: 800; }
    .fc .fc-button-primary { background: #e2e8f0 !important; color: #0f172a !important; font-weight: 800 !important; border: 0 !important; }
    .fc-theme-standard .fc-scrollgrid { border-radius: 8px; overflow: hidden; border: 1px solid #cbd5e1 !important; }
    
    /* マス目の高さとイベント配置の調整 */
    .fc-daygrid-day-events { display: flex; flex-direction: column; gap: 4px; padding: 2px !important; min-height: 55px !important; }
    .slot-block { display: flex; flex-direction: column; align-items: stretch; width: 100%; gap: 1px; }
    .slot-label-top { font-size: 9px; font-weight: 900; color: #0f172a; text-align: center; line-height: 1; }

    /* クッキリ原色ボタンデザイン */
    .slot-btn-box {
      width: 100%; text-align: center; padding: 4px 0; font-size: 10px; font-weight: 900; border-radius: 4px; cursor: pointer; user-select: none; text-shadow: 0 1px 1px rgba(0,0,0,0.2);
    }

    .bg-green-slot { background: linear-gradient(180deg, #22c55e 0%, #15803d 100%) !important; color: #fff !important; }
    .bg-red-slot { background: linear-gradient(180deg, #ef4444 0%, #b91c1c 100%) !important; color: #fff !important; }
    .bg-blue-slot { background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%) !important; color: #fff !important; box-shadow: 0 0 0 2px #fff; }
    .bg-purple-slot { background: linear-gradient(180deg, #a855f7 0%, #6b21a8 100%) !important; color: #fff !important; }
    .bg-sky-slot { background: linear-gradient(180deg, #0ea5e9 0%, #0369a1 100%) !important; color: #fff !important; cursor: not-allowed !important; }

    .fc-day-sat .fc-col-header-cell-cushion, .fc-day-sat .fc-daygrid-day-number { color: #2563eb !important; font-weight: 900; }
    .fc-day-sun .fc-col-header-cell-cushion, .fc-day-sun .fc-daygrid-day-number { color: #dc2626 !important; font-weight: 900; }

    .action-bar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 50; padding: 14px; background: rgba(255, 255, 255, 0.95); border-t: 1px solid #e2e8f0;
    }
    .action-inner { max-width: 520px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
    #submit-btn, #close-btn { width: 100%; border: 0; border-radius: 12px; font-weight: 800; display: flex; justify-content: center; align-items: center; gap: 8px; padding: 12px; }
    #submit-btn { color: #fff; background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%); font-size: 15px; }
    #submit-btn:disabled { opacity: 0.4; background: #94a3b8 !important; box-shadow: none; }
    #close-btn { color: #475569; background: #f1f5f9; border: 1px solid #cbd5e1; font-size: 13px; }
  </style>
</head>

<body>
  <header class="top-card">
    <div class="brand-row">
      <h1 class="brand-title">
        <span class="brand-icon"><i class="fa-solid fa-calendar-days"></i></span>
        <span>
          <span class="brand-kicker">SHINTAKU WORKS</span>
          シフト希望提出
        </span>
      </h1>
      <div id="user-info">読み込み中...</div>
    </div>
  </header>

  <main class="app-shell">
    <section class="guide-card" aria-label="ステータス説明">
      <div class="guide-title">
        <span><i class="fa-solid fa-list-check mr-1"></i> ステータス凡例</span>
      </div>
      <div class="legend-grid text-center">
        <div class="legend-item bg-green-slot">予約可</div>
        <div class="legend-item bg-red-slot">予約済</div>
        <div class="legend-item bg-sky-slot">確定</div>
        <div class="legend-item bg-blue-slot">選択中</div>
        <div class="legend-item bg-purple-slot">競合中</div>
      </div>
    </section>

    <section class="calendar-card">
      <div id="calendar"></div>
    </section>
  </main>

  <div class="action-bar">
    <div class="action-inner">
      <button id="submit-btn" disabled>
        <i class="fa-solid fa-paper-plane"></i> シフトを提出する (<span id="select-count">0</span>)
      </button>
      <button id="close-btn">
        <i class="fa-solid fa-xmark"></i> 提出せずに画面を閉じる
      </button>
    </div>
  </div>

  <script>
    // 正しい情報に固定
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxm7UaGS-K8ifm6zbqja199RqTt2GzIlRoMzGHjYjGW3TU_SlrtoJaz5vAw4GmQi0Wi/exec";
    const LIFF_ID = "2010136950-3fse6ErK";
    
    let userName = "テストユーザー"; 
    let currentSheetData = []; 
    let selectedSlots = {};   

    document.addEventListener("DOMContentLoaded", function() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isInClient() && !liff.isLoggedIn()) {
            document.getElementById("user-info").innerText = "⚠️ PCテストモード";
            initSystem();
          } else {
            if (!liff.isLoggedIn()) {
              liff.login();
            } else {
              liff.getProfile().then(profile => {
                userName = profile.displayName;
                document.getElementById("user-info").innerText = "👤 " + userName;
                initSystem();
              });
            }
          }
        }).catch(err => {
          document.getElementById("user-info").innerText = "⚠️ テストモード";
          initSystem();
        });
    });

    function initSystem() {
      fetch(`${GAS_URL}?action=getShift`)
        .then(res => res.json())
        .then(data => {
          currentSheetData = data;
          renderCalendar();
        }).catch(err => {
          console.error("データ通信に失敗", err);
          renderCalendar(); // 通信エラーでも枠だけは出す安全策
        });
    }

    function renderCalendar() {
      const calendarEl = document.getElementById('calendar');
      if (!calendarEl) return;

      // 古いカレンダーが残っていれば一回消去
      calendarEl.innerHTML = '';

      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'ja',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        height: 'auto',
        dayCellContent: function(e) { return e.dayNumberText.replace('日', ''); },
        
        dayCellDidMount: function(info) {
          const y = info.date.getFullYear();
          const m = String(info.date.getMonth() + 1).padStart(2, '0');
          const d = String(info.date.getDate()).padStart(2, '0');
          const dateStr = `${y}-${m}-${d}`;

          const eventsContainer = info.el.querySelector('.fc-daygrid-day-events');
          if (!eventsContainer) return;

          ['AM', 'PM'].forEach(slot => {
            const blockDiv = document.createElement('div');
            blockDiv.className = 'slot-block';

            const labelSpan = document.createElement('span');
            labelSpan.className = 'slot-label-top';
            labelSpan.innerText = slot;
            blockDiv.appendChild(labelSpan);

            const btn = document.createElement('div');
            btn.className = 'slot-btn-box';
            
            // 安全にデータマッチングを行う（文字列をトリム）
            const match = currentSheetData.find(item => item.date.trim() === dateStr && item.slot.trim() === slot);
            
            if (match) {
              if (match.status === '確定') {
                btn.className = 'slot-btn-box bg-sky-slot';
                btn.innerText = '確定';
                btn.dataset.status = 'confirmed';
              } else if (match.status === '予約済み') {
                btn.className = 'slot-btn-box bg-red-slot';
                btn.innerText = '予約済';
                btn.dataset.status = 'reserved';
              } else if (match.status === '競合') {
                btn.className = 'slot-btn-box bg-purple-slot';
                btn.innerText = '競合中';
                btn.dataset.status = 'conflict';
              }
            } else {
              btn.className = 'slot-btn-box bg-green-slot';
              btn.innerText = '予約可';
              btn.dataset.status = 'available';
            }

            if (btn.dataset.status !== 'confirmed') {
              btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const key = `${dateStr}_${slot}`;

                if (btn.dataset.status === 'available') {
                  if (selectedSlots[key]) {
                    delete selectedSlots[key];
                    btn.className = 'slot-btn-box bg-green-slot';
                    btn.innerText = '予約可';
                  } else {
                    selectedSlots[key] = { date: dateStr, slot: slot, mode: 'normal' };
                    btn.className = 'slot-btn-box bg-blue-slot';
                    btn.innerText = '選択中';
                  }
                } else if (btn.dataset.status === 'reserved' || btn.dataset.status === 'conflict') {
                  if (selectedSlots[key]) {
                    delete selectedSlots[key];
                    btn.className = `slot-btn-box ${match && match.status === '予約済み' ? 'bg-red-slot' : 'bg-purple-slot'}`;
                    btn.innerText = match && match.status === '予約済み' ? '予約済' : '競合中';
                  } else {
                    selectedSlots[key] = { date: dateStr, slot: slot, mode: 'force' };
                    btn.className = 'slot-btn-box bg-purple-slot';
                    btn.innerText = '競合中';
                  }
                }
                updateSubmitButton();
              });
            }

            blockDiv.appendChild(btn);
            eventsContainer.appendChild(blockDiv);
          });
        }
      });
      calendar.render();
    }

    function updateSubmitButton() {
      const count = Object.keys(selectedSlots).length;
      document.getElementById('select-count').innerText = count;
      document.getElementById('submit-btn').disabled = (count === 0);
    }

    document.getElementById('close-btn').addEventListener('click', function() {
      if (liff.isInClient()) {
        liff.closeWindow(); 
      } else {
        alert("PC環境のため、ブラウザのタブを直接閉じるか、前の画面に戻ってください。");
      }
    });

    document.getElementById('submit-btn').addEventListener('click', function() {
      const btn = this;
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 送信中...`;

      const payload = { userName: userName, selections: Object.values(selectedSlots) };
      const encodedData = encodeURIComponent(JSON.stringify(payload));
      const finalUrl = `${GAS_URL}?action=submitShift&data=${encodedData}`;

      const forceRefreshTimeout = setTimeout(() => {
        alert("シフト希望を受け付けました！");
        selectedSlots = {};
        initSystem();
      }, 1200);

      fetch(finalUrl, { method: "GET", mode: "no-cors" })
      .then(() => {
        clearTimeout(forceRefreshTimeout);
        alert("シフト希望を提出しました！先着判定の上、シートに記録されました。");
        selectedSlots = {};
        initSystem(); 
      })
      .catch(err => {
        clearTimeout(forceRefreshTimeout);
        selectedSlots = {};
        initSystem();
      });
    });
  </script>
</body>
</html>
