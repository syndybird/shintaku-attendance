<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHINTAKU WORKS シフト予約</title>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    /* カレンダーのマス全体のイベントコンテナ調整 */
    .fc-daygrid-day-events { display: flex; flex-direction: column; gap: 6px; padding: 2px !important; }

    /* 上下に「文字」と「ボタン」を並べるためのコンテナ */
    .slot-block { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 1px; }

    /* ボタンのすぐ上に表示するAM/PMテキスト */
    .slot-label-top { font-size: 10px; font-weight: 800; color: #000000; text-align: center; line-height: 1; margin-bottom: 2px; }

    /* 文字を入れる四角いボタン */
    .slot-btn-box { width: 100%; text-align: center; padding: 4px 0; font-size: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; user-select: none; transition: all 0.2s; white-space: nowrap; }

    /* カラーロジック */
    .bg-green-slot { background-color: #22c55e; color: #ffffff; }  /* 予約可 */
    .bg-red-slot { background-color: #ef4444; color: #ffffff; }    /* 予約済（他人） */
    .bg-blue-slot { background-color: #3b82f6; color: #ffffff; border: 1px solid #1d4ed8; }   /* 選択中 */
    .bg-sky-slot { background-color: #38bdf8; color: #ffffff; cursor: not-allowed; } /* 確定（本人） */

    /* 過去の他人の枠・未来の期間外のボタンデザイン */
    .bg-past-slot { background-color: #cbd5e1 !important; color: #64748b !important; border: none !important; cursor: not-allowed !important; opacity: 0.6; }

    /* 土日の曜日カラー変更 */
    .fc-day-sat .fc-col-header-cell-cushion,
    .fc-day-sat .fc-daygrid-day-number { color: #2563eb !important; font-weight: bold; } 
    .fc-day-sun .fc-col-header-cell-cushion,
    .fc-day-sun .fc-daygrid-day-number { color: #dc2626 !important; font-weight: bold; } 
  </style>
</head>
<body class="bg-slate-100 font-sans min-height-screen pb-36">

  <header class="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
    <h1 class="text-xl font-bold"><i class="fa-solid fa-calendar-days mr-2"></i>シフト希望提出</h1>
    <div id="user-info" class="text-sm bg-blue-800 px-3 py-1 rounded">読み込み中...</div>
  </header>

  <div class="max-w-md mx-auto m-3 p-3 bg-white rounded-lg shadow-sm grid grid-cols-4 gap-1 text-center text-xs font-bold">
    <div class="p-1 bg-green-500 text-white rounded">緑:予約可</div>
    <div class="p-1 bg-red-500 text-white rounded">赤:予約済</div>
    <div class="p-1 bg-sky-400 text-white rounded">水色:確定</div>
    <div class="p-1 bg-blue-500 text-white rounded">青:選択中</div>
  </div>

  <div class="max-w-md mx-auto p-2 bg-white rounded-lg shadow-md m-3">
    <div id="calendar"></div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 p-4 bg-white shadow-lg border-t border-slate-200 flex flex-col items-center gap-2 z-50">
    <button id="submit-btn" class="w-full max-w-md bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md flex justify-center items-center gap-2 transition disabled:bg-slate-400" disabled>
      <i class="fa-solid fa-paper-plane"></i> シフトを提出する (<span id="select-count">0</span>)
    </button>
    <button id="close-btn" class="w-full max-w-md bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 rounded-xl text-sm flex justify-center items-center gap-2 transition">
      <i class="fa-solid fa-xmark"></i> 提出せずに画面を閉じる
    </button>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxP7Xw2nUEUhdh8Nqtr7fOo7qz2VcJfOwy83Sh6nGv3NnfxaBpbPMUpskXy8B1wqGg0/exec";
    const LIFF_ID = "2010136950-3fse6ErK";

    const FIXED_DAYS = 7;      
    const RECRUIT_DAYS = 14;   

    let userName = "テストユーザー"; 
    let currentSheetData = []; 
    let selectedSlots = {};   

    // LIFF初期化
    document.addEventListener("DOMContentLoaded", function() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          if (!liff.isInClient() && !liff.isLoggedIn()) {
            document.getElementById("user-info").innerText = "⚠️ PCテストモード";
            initSystem();
          } else {
            if (!liff.isLoggedIn()) {
              liff.login();
            } else {
              liff.getProfile().then(profile => {
                userName = profile.displayName.trim(); 
                document.getElementById("user-info").innerText = "👤 " + userName;
                initSystem();
              });
            }
          }
        }).catch(err => {
          document.getElementById("user-info").innerText = "⚠️ テストモード";
          initSystem();
        });
    });

    function initSystem() {
      fetch(`${GAS_URL}?action=getShift`)
        .then(res => res.json())
        .then(data => {
          currentSheetData = data;
          renderCalendar();
        }).catch(err => {
          alert("データ通信に失敗しました。電波の良い場所で再開してください。");
          renderCalendar();
        });
    }

    function renderCalendar() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const endOfRecruitDate = new Date(today);
      endOfRecruitDate.setDate(endOfRecruitDate.getDate() + FIXED_DAYS + RECRUIT_DAYS);

      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'ja',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        height: 'auto',
        dayCellContent: function(e) { return e.dayNumberText.replace('日', ''); },

        dayCellDidMount: function(info) {
          const y = info.date.getFullYear();
          const m = String(info.date.getMonth() + 1).padStart(2, '0');
          const d = String(info.date.getDate()).padStart(2, '0');
          const dateStr = `${y}-${m}-${d}`;

          const cellDate = new Date(info.date);
          cellDate.setHours(0, 0, 0, 0);

          const isPast = cellDate < today;
          const isTooFuture = cellDate > endOfRecruitDate;

          const eventsContainer = info.el.querySelector('.fc-daygrid-day-events');
          if (!eventsContainer) return;
          eventsContainer.innerHTML = ''; 

          ['AM', 'PM'].forEach(slot => {
            const blockDiv = document.createElement('div');
            blockDiv.className = 'slot-block';

            const labelSpan = document.createElement('span');
            labelSpan.className = 'slot-label-top';
            labelSpan.innerText = slot;
            blockDiv.appendChild(labelSpan);

            const btn = document.createElement('div');
            btn.className = 'slot-btn-box';

            // スプレッドシートのデータから該当枠を検索
            const match = currentSheetData.find(d => d.date === dateStr && d.slot === slot);
            
            // 🔥 シートの正しい構造に完全マッピング
            // C列（status）＝ステータス、 D列（name）＝予約ユーザー
            const sheetStatus = match && match.status ? String(match.status).trim() : "";
            const sheetName = match && match.name ? String(match.name).trim() : "";
            const currentLoginName = userName ? String(userName).trim() : "";

            // 自分が「確定」しているかどうかの厳密な判定
            const isMyConfirm = match && sheetStatus === '確定' && sheetName === currentLoginName;

            // -------------------------------------------------------------
            // 【最優先ガード】自分が確定なら過去・現在問わず何が何でも水色！
            // -------------------------------------------------------------
            if (isMyConfirm) {
              btn.classList.add('bg-sky-slot');
              btn.innerText = '確定';
              btn.dataset.status = 'confirmed';

            } else if (isPast) {
              // -----------------------------------------
              // 【過去】働き終わったエリア（自分以外、または空き枠）
              // -----------------------------------------
              btn.classList.add('bg-past-slot');
              btn.innerText = '終了';  
              btn.dataset.status = 'locked';

            } else if (isTooFuture) {
              // -----------------------------------------
              // 【期間外】21日より先のフライング防止エリア
              // -----------------------------------------
              btn.classList.add('bg-past-slot');
              btn.innerText = '期間外';
              btn.dataset.status = 'locked';

            } else {
              // -----------------------------------------
              // 【今日〜21日後まで】リアルタイム募集エリア
              // -----------------------------------------
              if (match) {
                if (sheetStatus === '確定') {
                  // 他人が確定した枠（赤色ロック）
                  btn.classList.add('bg-red-slot');
                  btn.innerText = '予約済';
                  btn.dataset.status = 'locked';
                } else {
                  // ステータスが「予約済み（未確定）」の場合
                  if (sheetName === currentLoginName) {
                    btn.classList.add('bg-blue-slot');
                    btn.innerText = '選択中';
                    btn.dataset.status = 'already_reserved_by_me';
                    selectedSlots[`${dateStr}_${slot}`] = { date: dateStr, slot: slot, mode: 'normal' };
                  } else {
                    btn.classList.add('bg-red-slot');
                    btn.innerText = '予約済';
                    btn.dataset.status = 'locked';
                  }
                }
              } else {
                btn.classList.add('bg-green-slot');
                btn.innerText = '予約可';
                btn.dataset.status = 'available';
              }
            }

            if (btn.dataset.status !== 'confirmed' && btn.dataset.status !== 'locked') {
              btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const key = `${dateStr}_${slot}`;

                if (btn.dataset.status === 'available') {
                  if (selectedSlots[key]) {
                    delete selectedSlots[key];
                    btn.className = 'slot-btn-box bg-green-slot';
                    btn.innerText = '予約可';
                  } else {
                    selectedSlots[key] = { date: dateStr, slot: slot, mode: 'normal' };
                    btn.className = 'slot-btn-box bg-blue-slot';
                    btn.innerText = '選択中';
                  }
                } else if (btn.dataset.status === 'already_reserved_by_me') {
                  if (!selectedSlots[key]) {
                    selectedSlots[key] = { date: dateStr, slot: slot, mode: 'normal' };
                    btn.className = 'slot-btn-box bg-blue-slot';
                    btn.innerText = '選択中';
                  } else {
                    delete selectedSlots[key];
                    btn.className = 'slot-btn-box bg-green-slot';
                    btn.innerText = '予約可';
                  }
                }
                updateSubmitButton();
              });
            }

            blockDiv.appendChild(btn);
            eventsContainer.appendChild(blockDiv);
          });
        }
      });
      calendar.render();
      updateSubmitButton(); 
    }

    function updateSubmitButton() {
      const count = Object.keys(selectedSlots).length;
      document.getElementById('select-count').innerText = count;
      document.getElementById('submit-btn').disabled = false; 
    }

    document.getElementById('close-btn').addEventListener('click', function() {
      if (liff.isInClient()) {
        liff.closeWindow(); 
      } else {
        alert("PC環境のため、ブラウザのタブを直接閉じるか、前の画面に戻ってください。");
      }
    });

    document.getElementById('submit-btn').addEventListener('click', function() {
      const btn = this;
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 送信中...`;

      const payload = {
        userName: userName,
        selections: Object.values(selectedSlots)
      };

      const encodedData = encodeURIComponent(JSON.stringify(payload));
      const finalUrl = `${GAS_URL}?action=submitShift&data=${encodedData}`;

      fetch(finalUrl, { method: "GET" })
      .then(res => res.json())
      .then(result => {
        if (result.result === "success") {
          alert("シフト希望を提出しました！先着判定の上、シートに記録されました。");
          selectedSlots = {};
          initSystem(); 
        } else {
          alert("エラー: " + result.message);
          btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> シフトを提出する`;
          btn.disabled = false;
        }
      })
      .catch(err => {
        alert("送信処理を完了しました。最新の状況に更新します。");
        selectedSlots = {};
        initSystem();
      });
    });
  </script>
</body>
</html>
