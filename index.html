<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SHINTAKU 勤怠</title>

  <script src="config.js"></script>
  <script
    charset="utf-8"
    src="https://static.line-scdn.net/liff/edge/2/sdk.js">
  </script>

  <style>
    body { margin: 0; padding: 0; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .wrap { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; box-sizing: border-box; }
    .card { width: 100%; max-width: 380px; background: white; border-radius: 16px; padding: 36px 24px; box-sizing: border-box; box-shadow: 0 4px 20px rgba(0,0,0,0.06); text-align: center; }
    h1 { margin: 0 0 16px; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    p { margin: 0 0 24px; color: #444; font-size: 15px; line-height: 1.7; word-break: break-all; }
    .ok { color: #2e7d32; }
    .error { color: #c62828; }
    
    .msg-line { display: block; margin-bottom: 6px; }
    .msg-line:last-child { margin-bottom: 0; }
    
    /* 状況に合わせて色が変わるお知らせバー（初期状態は完全非表示） */
    .info-bar { padding: 14px; border-radius: 10px; font-weight: bold; margin-bottom: 24px; font-size: 15px; line-height: 1.4; display: none; }
    
    /* 成功時の緑バー */
    .info-bar.bg-green { display: block; background: #e8f5e9; color: #1b5e20; border: 1px solid #a5d6a7; }
    
    /* エラー時の赤バー */
    .info-bar.bg-red { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    
    .close-btn { background: #dc2626; color: white; border: none; padding: 16px 24px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; display: none; box-shadow: 0 4px 12px rgba(220,38,38,0.15); -webkit-tap-highlight-color: transparent; }
    .close-btn:active { background: #b91c1c; }
  </style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <h1 id="status">LINEと通信中...</h1>
    <p id="detail">しばらくお待ちください</p>
    
    <div id="infoBar" class="info-bar"></div>
    
    <button id="closeBtn" class="close-btn" onclick="liff.closeWindow()">画面を閉じる</button>
  </div>
</div>

<script>
  const myLiffId = CONFIG.LIFF_ID_ATTENDANCE;
  const gasUrl = CONFIG.GAS_URL;

  const status = document.getElementById("status");
  const detail = document.getElementById("detail");
  const infoBar = document.getElementById("infoBar");
  const closeBtn = document.getElementById("closeBtn");

  const params = new URLSearchParams(window.location.search);
  let type = params.get("type");

  if (!type) {
    const liffState = params.get("liff.state");
    if (liffState) {
      const stateParams = new URLSearchParams(liffState);
      type = stateParams.get("type");
    }
  }

  if (type) { sessionStorage.setItem("attendanceType", type); }
  if (!type) { type = sessionStorage.getItem("attendanceType"); }

  window.onload = async function () {
    infoBar.className = "info-bar";
    infoBar.innerText = "";
    infoBar.style.display = "none";

    if (!type) {
      status.innerText = "設定エラー";
      status.className = "error";
      detail.innerHTML = '<span class="msg-line">URLの指定（type）が</span><span class="msg-line">正しくありません。</span>';
      closeBtn.style.display = "block";
      return;
    }

    try {
      await liff.init({ liffId: myLiffId });

      if (!liff.isLoggedIn()) {
        status.innerText = "LINEログイン中...";
        detail.innerText = "認証画面へ移動します。";
        liff.login();
        return;
      }

      const profile = await liff.getProfile();

      if (type === "ユーザー登録") {
        status.innerText = "初期メンバー登録中...";
        detail.innerText = "LINEの情報を読み込んでいます。";
        await submitRegistration(profile.userId, profile.displayName);
      } else {
        status.innerText = `${type}データ送信中...`;
        detail.innerText = "サーバーに送信しています...";
        await sendAttendance(profile.userId);
      }

    } catch (err) {
      status.innerText = "システムエラー";
      status.className = "error";
      
      if (err.message.includes("revoked") || err.message.includes("expired")) {
        detail.innerHTML = '<span class="msg-line">有効期限が切れました。</span><span class="msg-line">もう一度QRコードを</span><span class="msg-line">読み直してください。</span>';
      } else {
        detail.innerText = err.message;
      }
      closeBtn.style.display = "block";
    }
  };

  // 打刻送信
  async function sendAttendance(userId) {
    try {
      const params = new URLSearchParams({ action: "attendance", userId: userId, type: type });
      const response = await fetch(gasUrl + "?" + params.toString());
      const resData = await response.json();

      if (resData.status === "success") {
        status.innerText = `${type}処理完了`;
        status.className = "ok";
        detail.innerHTML = '<span class="msg-line">間もなく画面が自動で閉じます。</span>';
        
        // シンプルな「 : 」区切りに変更
        infoBar.className = "info-bar bg-green";
        infoBar.innerText = `記録日時 : ${resData.datetime}`;
        
        sessionStorage.removeItem("attendanceType");
        setTimeout(() => { liff.closeWindow(); }, 2500);
      } else {
        status.innerText = "処理ができません";
        status.className = "error";
        
        let formattedMsg = resData.message.split('。').filter(Boolean).map(msg => `<span class="msg-line">${msg}。</span>`).join('');
        detail.innerHTML = formattedMsg;
        
        // シンプルな「 : 」区切りに変更
        if (resData.lastTime) {
          infoBar.className = "info-bar bg-red";
          infoBar.innerText = `直近の記録 : ${resData.lastTime}`;
        } else {
          infoBar.className = "info-bar";
          infoBar.style.display = "none";
        }
        
        closeBtn.style.display = "block";
      }
    } catch (err) {
      status.innerText = "通信エラー";
      status.className = "error";
      detail.innerHTML = '<span class="msg-line">打刻サーバーに</span><span class="msg-line">接続できませんでした。</span>';
      closeBtn.style.display = "block";
    }
  }

  // 自動ユーザー登録送信
  async function submitRegistration(userId, displayName) {
    try {
      const params = new URLSearchParams({ action: "register", userId: userId, name: displayName });
      const response = await fetch(gasUrl + "?" + params.toString());
      const resData = await response.json();

      if (resData.status === "already") {
        status.innerText = "登録済みです";
        status.className = "ok";
        detail.innerHTML = `<span class="msg-line">すでにメンバー登録済みです。</span>`;
        sessionStorage.removeItem("attendanceType");
        setTimeout(() => { liff.closeWindow(); }, 2500);
      } else if (resData.status === "success") {
        status.innerText = "登録完了！";
        status.className = "ok";
        detail.innerHTML = `<span class="msg-line">こんにちは、${displayName}さん。</span><span class="msg-line">メンバー登録が自動完了しました！</span>`;
        sessionStorage.removeItem("attendanceType");
        setTimeout(() => { liff.closeWindow(); }, 3000);
      } else {
        status.innerText = "登録の確認";
        status.className = "error";
        detail.innerText = resData.message;
        closeBtn.style.display = "block";
      }
    } catch (err) {
      status.innerText = "通信エラー";
      status.className = "error";
      detail.innerHTML = '<span class="msg-line">登録サーバーに</span><span class="msg-line">接続できませんでした。</span>';
      closeBtn.style.display = "block";
    }
  }
</script>

</body>
</html>
