<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHINTAKU 勤怠</title>

  <script
    charset="utf-8"
    src="https://static.line-scdn.net/liff/edge/2/sdk.js">
  </script>

  <style>
    body{ margin:0; padding:0; background:#f5f5f5; font-family:sans-serif; }
    .wrap{ min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; box-sizing:border-box; }
    .card{ width:100%; max-width:420px; background:white; border-radius:18px; padding:40px 24px; box-sizing:border-box; box-shadow:0 4px 24px rgba(0,0,0,0.08); text-align:center; }
    h1{ margin:0 0 18px; font-size:28px; }
    p{ margin:0 0 20px; color:#666; line-height:1.7; }
    .ok{ color:#2e7d32; font-weight:bold; }
    .error{ color:#c62828; font-weight:bold; }
    .last-time-box { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; display: none; font-size: 15px; }
    .close-btn { background: #dc2626; color: white; border: none; padding: 14px 24px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; display: none; margin-top: 10px; box-shadow: 0 2px 8px rgba(220,38,38,0.2); }
  </style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <h1 id="status">LINEと通信中...</h1>
    <p id="detail">しばらくお待ちください</p>
    
    <div id="lastTimeBox" class="last-time-box"></div>
    
    <button id="closeBtn" class="close-btn" onclick="liff.closeWindow()">画面を閉じる</button>
  </div>
</div>

<script>
  const myLiffId = "2010109211-y1fJhsUQ";
  // ★あなたの最新のGASデプロイURLに書き換えてください！
  const gasUrl = "https://script.google.com/macros/s/AKfycbwoGLFrW0mqbTIqzybdbynjI22DJj5Thi084NikSOKTHi1QIdJ6A6J19yfJYlTZaCpc/exec";

  const status = document.getElementById("status");
  const detail = document.getElementById("detail");
  const lastTimeBox = document.getElementById("lastTimeBox");
  const closeBtn = document.getElementById("closeBtn");

  const params = new URLSearchParams(window.location.search);
  let type = params.get("type");

  if (!type) {
    const liffState = params.get("liff.state");
    if (liffState) {
      const stateParams = new URLSearchParams(liffState);
      type = stateParams.get("type");
    }
  }

  if (type) { sessionStorage.setItem("attendanceType", type); }
  if (!type) { type = sessionStorage.getItem("attendanceType"); }

  window.onload = async function () {
    if (!type) {
      status.innerText = "設定エラー";
      status.className = "error";
      detail.innerText = "typeが指定されていません。";
      closeBtn.style.display = "block";
      return;
    }

    try {
      await liff.init({ liffId: myLiffId });

      if (!liff.isLoggedIn()) {
        status.innerText = "LINEログイン中...";
        detail.innerText = "認証画面へ移動します";
        liff.login();
        return;
      }

      const profile = await liff.getProfile();

      if (type === "ユーザー登録") {
        status.innerText = "初期メンバー登録中...";
        detail.innerText = "LINEの情報を読み込んでいます...";
        await submitRegistration(profile.userId, profile.displayName);
      } else {
        status.innerText = `${type}データ送信中...`;
        detail.innerText = "サーバーに送信しています...";
        await sendAttendance(profile.userId);
      }

    } catch (err) {
      status.innerText = "システムエラー";
      status.className = "error";
      detail.innerText = err.message;
      closeBtn.style.display = "block";
    }
  };

  // 打刻送信
  async function sendAttendance(userId) {
    try {
      const response = await fetch(gasUrl, {
        method: "POST",
        body: JSON.stringify({ action: "attendance", userId: userId, type: type })
      });
      const resData = await response.json();

      if (resData.status === "success") {
        status.innerText = `${type}処理完了`;
        status.className = "ok";
        detail.innerHTML = `${resData.datetime}<br><span style="font-size:12px; color:#999;">間もなく画面が閉じます。</span>`;
        sessionStorage.removeItem("attendanceType");
        setTimeout(() => { liff.closeWindow(); }, 2000);
      } else {
        // ★打刻エラー時の処理
        status.innerText = `${type}できません`;
        status.className = "error";
        detail.innerText = resData.message;
        
        // 前回の時間データがあれば赤枠で表示
        if (resData.lastTime) {
          lastTimeBox.innerText = `直近の記録 ➡️ ${resData.lastTime}`;
          lastTimeBox.style.display = "block";
        }
        
        // 閉じるボタンを表示
        closeBtn.style.display = "block";
      }
    } catch (err) {
      status.innerText = "通信エラー";
      status.className = "error";
      detail.innerText = "打刻サーバーに接続できませんでした。";
      closeBtn.style.display = "block";
    }
  }

  // 自動ユーザー登録送信
  async function submitRegistration(userId, displayName) {
    try {
      const response = await fetch(gasUrl, {
        method: "POST",
        body: JSON.stringify({ action: "register", userId: userId, name: displayName })
      });
      const resData = await response.json();

      if (resData.status === "success") {
        status.innerText = "登録完了！";
        status.className = "ok";
        detail.innerHTML = `こんにちは、${displayName}さん。<br>メンバー登録が自動完了しました！`;
        sessionStorage.removeItem("attendanceType");
        setTimeout(() => { liff.closeWindow(); }, 3000);
      } else {
        status.innerText = "登録の確認";
        status.className = "error";
        detail.innerText = resData.message;
        closeBtn.style.display = "block";
      }
    } catch (err) {
      status.innerText = "通信エラー";
      status.className = "error";
      detail.innerText = "登録サーバーに接続できませんでした。";
      closeBtn.style.display = "block";
    }
  }
</script>

</body>
</html>
