<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHINTAKU 勤怠</title>

  <script
    charset="utf-8"
    src="https://static.line-scdn.net/liff/edge/2/sdk.js">
  </script>

  <style>
    body{ margin:0; padding:0; background:#f5f5f5; font-family:sans-serif; }
    .wrap{ min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; box-sizing:border-box; }
    .card{ width:100%; max-width:420px; background:white; border-radius:18px; padding:40px 24px; box-sizing:border-box; box-shadow:0 4px 24px rgba(0,0,0,0.08); text-align:center; }
    h1{ margin:0 0 18px; font-size:28px; }
    p{ margin:0 0 20px; color:#666; line-height:1.7; }
    .ok{ color:#2e7d32; font-weight:bold; }
    .error{ color:#c62828; font-weight:bold; }
    input[type="text"] { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 20px; text-align: center; }
    button { background: #06C755; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; }
    button:disabled { background: #ccc; }
    #registerForm { display: none; }
  </style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <h1 id="status">LINEと通信中...</h1>
    <p id="detail">しばらくお待ちください</p>

    <div id="registerForm">
      <input type="text" id="userName" placeholder="お名前を入力（例: 山田太郎）">
      <button id="regBtn" onclick="submitRegistration()">メンバー登録する</button>
    </div>
  </div>
</div>

<script>
  const myLiffId = "2010109211-y1fJhsUQ";
  // ★あなたの最新のGASデプロイURLに書き換えてください！
  const gasUrl = "https://script.google.com/macros/s/AKfycbyuLXLzn9IKy18OWGnijll4c9uQ1-kZK_1V_bCXtW4AQt1iTTSFw13xJ4SxbIEv-jRA/exec";

  const status = document.getElementById("status");
  const detail = document.getElementById("detail");
  const registerForm = document.getElementById("registerForm");
  let currentUserId = "";

  const params = new URLSearchParams(window.location.search);
  let type = params.get("type");

  if (!type) {
    const liffState = params.get("liff.state");
    if (liffState) {
      const stateParams = new URLSearchParams(liffState);
      type = stateParams.get("type");
    }
  }

  if (type) { sessionStorage.setItem("attendanceType", type); }
  if (!type) { type = sessionStorage.getItem("attendanceType"); }

  window.onload = async function () {
    if (!type) {
      status.innerText = "設定エラー";
      status.className = "error";
      detail.innerText = "typeが指定されていません。";
      return;
    }

    try {
      await liff.init({ liffId: myLiffId });

      if (!liff.isLoggedIn()) {
        status.innerText = "LINEログイン中...";
        detail.innerText = "認証画面へ移動します";
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      currentUserId = profile.userId;

      if (type === "ユーザー登録") {
        status.innerText = "新規メンバー登録";
        detail.innerText = "勤怠システムを利用するために、お名前を登録してください。";
        registerForm.style.display = "block";
      } else {
        status.innerText = `${type}データ送信中...`;
        detail.innerText = "サーバーに送信しています...";
        await sendAttendance(currentUserId);
      }

    } catch (err) {
      status.innerText = "システムエラー";
      status.className = "error";
      detail.innerText = err.message;
    }
  };

  // 打刻送信
  async function sendAttendance(userId) {
    try {
      const response = await fetch(gasUrl, {
        method: "POST",
        body: JSON.stringify({ action: "attendance", userId: userId, type: type })
      });
      const resData = await response.json();

      if (resData.status === "success") {
        status.innerText = `${type}処理完了`;
        status.className = "ok";
        detail.innerHTML = `${resData.datetime}<br><span style="font-size:12px; color:#999;">間もなく画面が閉じます。</span>`;
        sessionStorage.removeItem("attendanceType");
        setTimeout(() => { liff.closeWindow(); }, 2000);
      } else {
        status.innerText = `${type}できません`;
        status.className = "error";
        detail.innerText = resData.message;
      }
    } catch (err) {
      status.innerText = "通信エラー";
      status.className = "error";
      detail.innerText = "打刻サーバーに接続できませんでした。";
    }
  }

  // ユーザー登録送信
  async function submitRegistration() {
    const nameInput = document.getElementById("userName").value.trim();
    if (!nameInput) {
      alert("お名前を入力してください。");
      return;
    }

    document.getElementById("regBtn").disabled = true;
    status.innerText = "登録情報を送信中...";

    try {
      const response = await fetch(gasUrl, {
        method: "POST",
        body: JSON.stringify({ action: "register", userId: currentUserId, name: nameInput })
      });
      const resData = await response.json();

      if (resData.status === "success") {
        status.innerText = "登録が完了しました！";
        status.className = "ok";
        registerForm.style.display = "none";
        detail.innerHTML = `こんにちは、${nameInput}さん。<br>明日から出勤・退勤のQRコードで打刻できます。<br><span style="font-size:12px; color:#999;">画面を閉じてトークに戻ってください。</span>`;
        sessionStorage.removeItem("attendanceType");
      } else {
        status.innerText = "登録失敗";
        status.className = "error";
        detail.innerText = resData.message;
        document.getElementById("regBtn").disabled = false;
      }
    } catch (err) {
      status.innerText = "通信エラー";
      status.className = "error";
      detail.innerText = "登録サーバーに接続できませんでした。";
      document.getElementById("regBtn").disabled = false;
    }
  }
</script>

</body>
</html>
